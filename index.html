/* ══════════ UPLOAD CON IA ══════════ */
function UploadPage({entity, showToast, onDeviceResult}) {
  const [file,setFile]=useState(null);
  const [rawData,setRawData]=useState(null);
  const [allRows,setAllRows]=useState([]);
  const [headers,setHeaders]=useState([]);
  const [mapping,setMapping]=useState({});
  const [fileType,setFileType]=useState(null);
  const [aiAnalyzing,setAiAnalyzing]=useState(false);
  const [mappingConfirmed,setMappingConfirmed]=useState(false);
  const [uploading,setUploading]=useState(false);
  const [result,setResult]=useState(null);
  const [history,setHistory]=useState(()=>{
    try{const s=localStorage.getItem('upload_history');return s?JSON.parse(s):[];}catch(e){return [];}
  });
  const [showHistory,setShowHistory]=useState(false);
  const fileRef=useRef();

  const saveToHistory=(entry)=>{
    setHistory(prev=>{
      const next=[entry,...prev].slice(0,50);
      try{localStorage.setItem('upload_history',JSON.stringify(next));}catch(e){}
      return next;
    });
  };

  const TX_REQUIRED=['amount','channel','cardholder','account_number'];
  const TX_ALL=['tx_id','amount','channel','cardholder','account_number','city','datetime','dest_account','dest_name'];
  const TX_DESC={tx_id:'ID único de la transacción',amount:'Monto',channel:'Canal (CARD/TRANSFER/ATM)',cardholder:'Nombre del titular',account_number:'Cuenta origen',city:'Ciudad',datetime:'Fecha y hora',dest_account:'Cuenta destino',dest_name:'Nombre destino'};
  const DEV_FIELDS=['device_id','identity','session_id','bank','device_fingerprint','os','browser','ips'];
  const DEV_DESC={device_id:'ID único del dispositivo',identity:'Cuenta/usuario',session_id:'ID de sesión',bank:'Banco',device_fingerprint:'Fingerprint del dispositivo',os:'Sistema operativo',browser:'Navegador',ips:'IPs de la sesión'};

  const readFile=(f)=>{
    setFile(f);setResult(null);setMapping({});setMappingConfirmed(false);setFileType(null);
    const name=f.name.toLowerCase();
    const isCsv=name.endsWith('.csv')||name.endsWith('.tsv')||name.endsWith('.txt');
    const reader=new FileReader();
    reader.onload=async(ev)=>{
      try{
        let rows=[];
        if(isCsv){
          // Parsear CSV/TSV — detectar separador automáticamente
          const text=ev.target.result;
          const lines=text.split(/\r?\n/).filter(l=>l.trim());
          if(!lines.length){showToast('Archivo vacío','err');return;}
          // Detectar separador: tab, punto y coma, o coma
          const sample=lines[0];
          const sep=sample.includes('\t')?'\t':sample.includes(';')?';':',';
          rows=lines.map(l=>l.split(sep).map(c=>c.replace(/^"+|"+$/g,'').trim()));
        }else{
          // xlsx / xls
          const wb=XLSX.read(ev.target.result,{type:'binary'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        }
        if(!rows.length){showToast('Archivo vacío','err');return;}
        const hdrs=rows[0].map(h=>String(h||'').trim());
        setHeaders(hdrs);
        setRawData(rows.slice(1,6));
        setAllRows(rows.slice(1).filter(r=>r.some(c=>String(c).trim())));
        setAiAnalyzing(true);
        await aiDetectMapping(hdrs,rows.slice(1,4));
      }catch(e){showToast('Error leyendo archivo: '+e.message,'err');}
    };
    if(isCsv) reader.readAsText(f,'UTF-8');
    else reader.readAsBinaryString(f);
  };

  const aiDetectMapping=async(hdrs,sampleRows)=>{
    try{
      const prompt='Archivo tabular con columnas: '+JSON.stringify(hdrs)+'\nFilas de muestra: '+JSON.stringify(sampleRows.slice(0,2))+'\n\nDetermina si este archivo es TRANSACCIONAL (tiene montos, canales de pago) o de DISPOSITIVOS/SESIONES (tiene device_id, fingerprints, IPs).\n\nResponde SOLO con JSON sin texto adicional:\n{"type":"transactional"|"device","mapping":{"campo_sistema":"columna_excel",...}}';
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
      });
      const data=await resp.json();
      const text=data.content?.[0]?.text||'';
      const clean=text.replace(/```json|```/g,'').trim();
      const parsed=JSON.parse(clean);
      setFileType(parsed.type||'transactional');
      setMapping(parsed.mapping||{});
    }catch(e){
      // Fallback: detección heurística
      const hdrsLow=hdrs.map(h=>h.toLowerCase());
      const isDevice=hdrsLow.some(h=>['device_id','deviceid','fingerprint','device_fingerprint'].includes(h));
      setFileType(isDevice?'device':'transactional');
      const m={};
      if(isDevice){
        ['device_id','identity','session_id','bank','device_fingerprint','os','browser','ips'].forEach(f=>{
          const found=hdrs.find(h=>h.toLowerCase().includes(f.split('_')[0]));
          if(found)m[f]=found;
        });
      }
      setMapping(m);
    }
    setAiAnalyzing(false);
  };

  const analyzeDevices=(rows,hdrs,mp)=>{
    const idx=(f)=>hdrs.indexOf(mp[f]);
    const get=(row,f)=>String(row[idx(f)]||'').trim();
    
    const deviceMap={};
    const ipMap={};
    const fpMap={};
    
    rows.forEach(row=>{
      const did=get(row,'device_id');
      const identity=get(row,'identity');
      const ips=get(row,'ips').split(',').map(s=>s.trim()).filter(Boolean);
      const fp=get(row,'device_fingerprint');
      const os=get(row,'os');
      const browser=get(row,'browser');
      const bank=get(row,'bank');
      
      if(!did)return;
      if(!deviceMap[did])deviceMap[did]={accounts:new Set(),ips:new Set(),fps:new Set(),sessions:0,os,browser,bank};
      if(identity&&identity!=='-')deviceMap[did].accounts.add(identity);
      ips.forEach(ip=>{deviceMap[did].ips.add(ip);if(ip){if(!ipMap[ip])ipMap[ip]=new Set();if(identity&&identity!=='-')ipMap[ip].add(identity);}});
      if(fp){deviceMap[did].fps.add(fp);if(!fpMap[fp])fpMap[fp]=new Set();if(identity&&identity!=='-')fpMap[fp].add(identity);}
      deviceMap[did].sessions++;
    });
    
    const riskScore=(d)=>{
      let s=0;
      if(d.accounts.size>=5)s+=80;else if(d.accounts.size>=3)s+=50;else if(d.accounts.size>=2)s+=30;
      if(d.ips.size>=5)s+=20;else if(d.ips.size>=3)s+=10;
      if(d.fps.size>1)s+=15;
      if(d.sessions>20)s+=10;
      return Math.min(999,s*9);
    };
    
    const suspiciousDevices=Object.entries(deviceMap)
      .filter(([,d])=>d.accounts.size>1)
      .map(([did,d])=>{
        const rs=riskScore(d);
        return{device:did,accounts:[...d.accounts],ips:[...d.ips],fingerprints:[...d.fps],sessions:d.sessions,risk:rs,level:rs>=700?'CRITICO':rs>=450?'ALTO':'MEDIO',os:d.os,browser:d.browser,bank:d.bank};
      }).sort((a,b)=>b.risk-a.risk);
    
    const suspiciousIPs=Object.entries(ipMap)
      .filter(([,s])=>s.size>1)
      .map(([ip,s])=>({ip,accounts:[...s],count:s.size}))
      .sort((a,b)=>b.count-a.count);
    
    const sharedFPs=Object.entries(fpMap)
      .filter(([,s])=>s.size>1)
      .map(([fp,s])=>({fp,accounts:[...s],count:s.size}));
    
    const accountDevices={};
    rows.forEach(row=>{
      const did=get(row,'device_id');const identity=get(row,'identity');
      if(!identity||identity==='-'||!did)return;
      if(!accountDevices[identity])accountDevices[identity]=new Set();
      accountDevices[identity].add(did);
    });
    const multiDeviceAccounts=Object.entries(accountDevices)
      .filter(([,s])=>s.size>1)
      .map(([account,s])=>({account,devices:[...s],count:s.size}))
      .sort((a,b)=>b.count-a.count);
    
    // Generar alertas
    const alerts=[];
    const id=()=>Date.now()+'_'+Math.random().toString(36).slice(2,7);
    suspiciousDevices.forEach(d=>{
      alerts.push({id:id(),type:'DEVICE_SHARING',severity:d.level,title:'Dispositivo compartido entre '+d.accounts.length+' cuentas',detail:'Device '+d.device.slice(0,20)+'... usado por multiples cuentas',risk:d.risk,accounts:d.accounts,ips:d.ips,evidence:[d.device.slice(0,24),...d.accounts.slice(0,3)],status:'PENDING',created_at:new Date().toISOString()});
    });
    suspiciousIPs.slice(0,20).forEach(ip=>{
      const sev=ip.count>=5?'CRITICO':ip.count>=3?'ALTO':'MEDIO';
      const rs=Math.min(999,(ip.count*120));
      alerts.push({id:id(),type:'SHARED_IP',severity:sev,title:'IP '+ip.ip+' compartida por '+ip.count+' cuentas',detail:'La misma IP de red fue usada por multiples identidades',risk:rs,accounts:ip.accounts,ips:[ip.ip],evidence:[ip.ip,...ip.accounts.slice(0,3)],status:'PENDING',created_at:new Date().toISOString()});
    });
    sharedFPs.slice(0,10).forEach(fp=>{
      const sev=fp.count>=4?'CRITICO':fp.count>=2?'ALTO':'MEDIO';
      const rs=Math.min(999,(fp.count*150));
      alerts.push({id:id(),type:'DUPLICATE_FINGERPRINT',severity:sev,title:'Fingerprint duplicado en '+fp.count+' cuentas',detail:'Mismo fingerprint de dispositivo vinculado a multiples cuentas',risk:rs,accounts:fp.accounts,ips:[],evidence:[fp.fp.slice(0,24),...fp.accounts.slice(0,3)],status:'PENDING',created_at:new Date().toISOString()});
    });
    
    return{type:'device',suspiciousDevices,suspiciousIPs,sharedFPs,multiDeviceAccounts,alerts,totalRows:rows.length,totalDevices:Object.keys(deviceMap).length,totalAccounts:Object.keys(accountDevices).length};
  };

  const processUpload=async()=>{
    if(!file)return;
    setUploading(true);setResult(null);
    const isDevice=fileType==='device';
    
    if(isDevice){
      // Analisis 100% frontend
      await new Promise(r=>setTimeout(r,800));
      const r=analyzeDevices(allRows,headers,mapping);
      setResult(r);
      saveToHistory({id:Date.now(),type:'device',filename:file.name,date:new Date().toISOString(),summary:{devices:r.suspiciousDevices.length,ips:r.suspiciousIPs.length,alerts:r.alerts.length,rows:r.totalRows},alerts:r.alerts});
      if(onDeviceResult)onDeviceResult(r);
      showToast('Analisis completado: '+r.suspiciousDevices.length+' dispositivos sospechosos','ok');
      setUploading(false);
      return;
    }
    
    if(!entity){showToast('Falta entidad','err');setUploading(false);return;}
    try{
      const token=getToken();
      const fd=new FormData();fd.append('file',file);fd.append('mapping',JSON.stringify(mapping));
      const r=await fetch(API_BASE+'/api/v2/auth/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});
      const d=await r.json();
      if(!r.ok){showToast(d.detail||'Error procesando','err');setUploading(false);return;}
      setResult({type:'transactional',...d});
      if(d.saved>0){
        saveToHistory({id:Date.now(),type:'transactional',filename:file.name,date:new Date().toISOString(),summary:{saved:d.saved,errors:d.errors,total:d.total},scored:d.scored||[]});
        showToast(d.saved+' transacciones procesadas','ok');
      }else showToast('No se proceso ninguna fila valida','err');
    }catch(e){showToast('Error: '+e.message,'err');}
    setUploading(false);
  };

  const riskColor=(l)=>l==='CRITICO'?'var(--red)':l==='ALTO'?'var(--amber)':'var(--orange)';
  const isDevice=fileType==='device';
  const currentFields=isDevice?DEV_FIELDS:TX_ALL;
  const currentDesc=isDevice?DEV_DESC:TX_DESC;
  const currentRequired=isDevice?['device_id','identity']:TX_REQUIRED;
  const mappingComplete=currentRequired.every(f=>mapping[f]);

  return(
    <div>
      <div className="page-title">📤 Carga Masiva con IA</div>
      <div className="page-sub">Sube cualquier Excel — la IA detecta el tipo de datos y las columnas automaticamente</div>
      {!entity&&fileType!=='device'&&<div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:11,color:'var(--amber)'}}>Necesitas tener una entidad asignada para cargar transacciones</div>}

      {/* PASO 1: SUBIR */}
      {!file&&(
        <div className="card">
          <div className="card-title">Arrastra tu archivo Excel o haz clic para seleccionarlo</div>
          <div onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)readFile(f);}} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current&&fileRef.current.click()}
            style={{marginTop:12,border:'2px dashed var(--border2)',borderRadius:10,padding:'48px 24px',textAlign:'center',cursor:'pointer',transition:'all .2s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--teal)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border2)'}>
            <div style={{fontSize:48,marginBottom:12}}>📂</div>
            <div style={{fontSize:13,color:'var(--light)',fontWeight:600,marginBottom:6}}>Excel, CSV, TSV o cualquier formato tabular</div>
            <div style={{fontSize:10,color:'var(--slate)'}}>La IA detecta el tipo de datos y las columnas automaticamente</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.tsv,.txt,.ods" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f);}}/>
          </div>

      {/* PASO 2: MAPEO */}
      {file&&!mappingConfirmed&&(

      {result&&result.type==='device'&&(()=>{
        const{suspiciousDevices,suspiciousIPs,sharedFPs,multiDeviceAccounts,alerts,totalRows,totalDevices,totalAccounts}=result;

              {[['Sesiones',totalRows,'var(--muted)'],['Dispositivos',totalDevices,'var(--light)'],['Cuentas',totalAccounts,'var(--teal)'],['Dispositivos sospechosos',suspiciousDevices.length,'var(--red)']].map(([l,v,c])=>(

              <div style={{marginBottom:14}}>
                <div className="sec" style={{color:'var(--red)'}}>Dispositivos comprometidos ({suspiciousDevices.length})</div>

                      <div style={{textAlign:'right'}}>
                        <div style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:800,color:riskColor(d.level)}}>{d.risk}</div>
                        <span style={{fontSize:8,padding:'2px 7px',borderRadius:3,color:riskColor(d.level)}}>{d.level}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      <div style={{flex:1,minWidth:160}}>
                        <div style={{fontSize:8,color:'var(--slate)',marginBottom:4}}>CUENTAS ({d.accounts.length})</div>
                        {d.accounts.map((a,j)=><div key={j} style={{fontSize:9,padding:'2px 6px',background:'rgba(255,59,92,.1)',borderRadius:3,marginBottom:2}}>{a.slice(0,32)}</div>)}
                      </div>
                      <div style={{flex:1,minWidth:160}}>
                        <div style={{fontSize:8,color:'var(--slate)',marginBottom:4}}>IPs ({d.ips.length})</div>
                        {d.ips.slice(0,4).map((ip,j)=><div key={j} style={{fontSize:9,padding:'2px 6px',background:'rgba(245,158,11,.1)',borderRadius:3,marginBottom:2}}>{ip}</div>)}
                        {d.ips.length>4&&<div style={{fontSize:8,color:'var(--slate)'}}>+{d.ips.length-4} mas</div>}
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {suspiciousIPs.length>0&&(
              <div className="card" style={{marginBottom:14}}>
                <div className="card-title" style={{color:'var(--amber)'}}>IPs compartidas (top 20)</div>
                <table className="tbl" style={{marginTop:8}}><thead><tr><th>IP</th><th>Cuentas</th><th>Riesgo</th></tr></thead>
                <tbody>{suspiciousIPs.slice(0,20).map((ip,i)=>(
                  <tr key={i}><td style={{fontFamily:'var(--mono)',color:'var(--amber)'}}>{ip.ip}</td>
                  <td>{ip.accounts.slice(0,3).map((a,j)=><span key={j} style={{fontSize:8,padding:'1px 5px',background:'var(--bg3)',borderRadius:2,marginRight:3}}>{a.slice(0,20)}</span>)}{ip.accounts.length>3&&<span style={{fontSize:8,color:'var(--slate)'}}>+{ip.accounts.length-3}</span>}</td>
                  <td><span style={{fontFamily:'var(--sans)',fontWeight:700,color:ip.count>=4?'var(--red)':ip.count>=2?'var(--amber)':'var(--orange)'}}>{ip.count} cuentas</span></td></tr>
                ))}</tbody></table>
              </div>
            )}

            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>{setFile(null);setResult(null);setMapping({});setMappingConfirmed(false);if(fileRef.current)fileRef.current.value='';}}>Nueva carga</button>
            </div>

      {/* RESULTADOS TRANSACCIONALES */}
      {result&&result.type==='transactional'&&(
        <div>
          <div className="grid-3" style={{marginBottom:12}}>
            {[['Total filas',result.total,'var(--muted)'],['Procesadas',result.saved,'var(--teal)'],['Con error',result.errors,result.errors>0?'var(--red)':'var(--slate)']].map(([l,v,c])=>(
              <div className="card" key={l}><div className="card-title">{l}</div><div style={{fontFamily:'var(--sans)',fontSize:28,fontWeight:800,color:c}}>{v}</div></div>
            ))}
          </div>
          {result.scored&&result.scored.length>0&&(()=>{
            const counts=result.scored.reduce((a,t)=>({...a,[t.decision]:(a[t.decision]||0)+1}),{});
            return(<div className="card" style={{marginBottom:12}}><div className="card-title">Distribucion de decisiones</div><div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>{Object.entries(counts).map(([d,n])=>(<div key={d} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 14px',textAlign:'center'}}><div style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:800,color:d==='BLOQUEADA'?'var(--red)':d==='REVISION'?'var(--amber)':d==='ALERTA'?'var(--orange)':'var(--teal)'}}>{n}</div><div style={{fontSize:8,color:'var(--slate)',marginTop:2}}>{d}</div></div>))}</div></div>);
          })()}
          {result.error_detail&&result.error_detail.length>0&&<div className="card" style={{marginBottom:12,border:'1px solid rgba(255,59,92,.2)'}}><div className="card-title" style={{color:'var(--red)'}}>Filas con error ({result.error_detail.length})</div>{result.error_detail.map((e,i)=>(<div key={i} style={{padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:9}}><span style={{color:'var(--slate)'}}>Fila {e.row}</span><span style={{color:'var(--red)',marginLeft:8}}>{e.errors&&e.errors.join(', ')}</span></div>))}</div>}
          {result.scored&&result.scored.length>0&&<div className="card"><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><div className="card-title" style={{margin:0}}>Preview (primeras {Math.min(result.scored.length,50)})</div><span style={{fontSize:8,color:'var(--slate)'}}>{result.scored.length} total</span></div>
            <div style={{maxHeight:360,overflowY:'auto'}}><table className="tbl"><thead><tr><th>TX ID</th><th>Monto</th><th>Canal</th><th>Score</th><th>Decision</th></tr></thead>
            <tbody>{result.scored.slice(0,50).map(t=>(<tr key={t.tx_id}><td className="mono">{t.tx_id}</td><td>{fmtAmt(t.amount)}</td><td><span className={'badge '+t.risk}>{t.channel}</span></td><td style={{fontFamily:'var(--sans)',fontWeight:700,color:scoreColor(t.score)}}>{t.score}</td><td><span className={'badge '+t.decision}>{t.decision}</span></td></tr>))}</tbody></table></div>
            <div style={{marginTop:8,fontSize:9,color:'var(--teal)'}}>Transacciones en Dashboard y Alertas</div>
          </div>}
        </div>
      )}
    </div>
  );
}


/* ══════════ OTHER ALERTS ══════════ */
function OtherAlerts({alerts, setAlerts, showToast}) {
  const [filter,setFilter]=useState('ALL');
  const [typeFilter,setTypeFilter]=useState('ALL');
  const [sel,setSel]=useState(null);

  const filtered=alerts.filter(a=>{
    if(filter!=='ALL'&&a.status!==filter)return false;
    if(typeFilter!=='ALL'&&a.type!==typeFilter)return false;
    return true;
  });

  const selAlert=alerts.find(a=>a.id===sel);

  const markReviewed=(id)=>{
    setAlerts(prev=>{
      const next=prev.map(a=>a.id===id?{...a,status:'REVIEWED',reviewed_at:new Date().toISOString()}:a);
      try{localStorage.setItem('device_alerts',JSON.stringify(next.slice(0,500)));}catch(e){}
      return next;
    });
    showToast('Alerta marcada como revisada','ok');
  };

  const clearAll=()=>{
    if(!confirm('Eliminar todas las alertas de dispositivos?'))return;
    setAlerts([]);
    localStorage.removeItem('device_alerts');
    setSel(null);
    showToast('Alertas eliminadas','ok');
  };

  const sevColor=(s)=>s==='CRITICO'?'var(--red)':s==='ALTO'?'var(--amber)':'var(--orange)';
  const sevBg=(s)=>s==='CRITICO'?'rgba(255,59,92,.12)':s==='ALTO'?'rgba(245,158,11,.1)':'rgba(249,115,22,.08)';
  const typeLabel={DEVICE_SHARING:'Dispositivo Compartido',SHARED_IP:'IP Compartida',DUPLICATE_FINGERPRINT:'Fingerprint Duplicado'};

  const pending=alerts.filter(a=>a.status==='PENDING').length;
  const crit=alerts.filter(a=>a.severity==='CRITICO').length;
  const alto=alerts.filter(a=>a.severity==='ALTO').length;

  return(
    <div>
      <div className="page-title">Otras Alertas</div>
      <div className="page-sub">Alertas de comportamiento de dispositivos generadas en Carga Masiva</div>

      {alerts.length===0&&(
        <div className="card" style={{textAlign:'center',padding:'60px',opacity:.5}}>
          <div style={{fontSize:40,marginBottom:12}}>📭</div>
          <div style={{fontSize:12,color:'var(--slate)'}}>No hay alertas de dispositivos</div>
          <div style={{fontSize:10,color:'var(--border2)',marginTop:6}}>Sube un archivo de sesiones en Carga Masiva para generar alertas</div>
        </div>
      )}

      {alerts.length>0&&(
        <>
          <div className="grid-4" style={{marginBottom:14}}>
            {[['Total',alerts.length,'var(--muted)'],['Pendientes',pending,'var(--amber)'],['CRITICO',crit,'var(--red)'],['ALTO',alto,'var(--orange)']].map(([l,v,c])=>(
              <div className="card" key={l}><div className="card-title">{l}</div><div style={{fontFamily:'var(--sans)',fontSize:24,fontWeight:800,color:c}}>{v}</div></div>
            ))}
          </div>

          <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
            {['ALL','PENDING','REVIEWED'].map(s=>(
              <button key={s} className={'btn '+(filter===s?'btn-red':'btn-ghost')} style={{padding:'4px 12px',fontSize:9}} onClick={()=>setFilter(s)}>{s}</button>
            ))}
            <span style={{color:'var(--border2)',margin:'0 4px'}}>|</span>
            {['ALL','DEVICE_SHARING','SHARED_IP','DUPLICATE_FINGERPRINT'].map(t=>(
              <button key={t} className={'btn '+(typeFilter===t?'btn-amber':'btn-ghost')} style={{padding:'3px 8px',fontSize:8}} onClick={()=>setTypeFilter(t)}>{t==='ALL'?'TODOS':t.replace('_',' ')}</button>
            ))}
            <button className="btn btn-ghost" style={{marginLeft:'auto',padding:'3px 10px',fontSize:8,color:'var(--red)'}} onClick={clearAll}>Limpiar todo</button>
          </div>

          <div className="split">
            <div className="split-left">
              {filtered.length===0&&<div className="center" style={{height:200,color:'var(--slate)'}}>Sin alertas para este filtro</div>}
              {filtered.map(a=>(
                <div key={a.id} onClick={()=>setSel(a.id)}
                  style={{padding:'10px 14px',borderBottom:'1px solid var(--border)',background:sel===a.id?'var(--bg3)':'transparent',cursor:'pointer',borderLeft:'3px solid '+(sel===a.id?sevColor(a.severity):'transparent'),transition:'all .1s'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:10,color:'var(--white)',fontWeight:600,marginBottom:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{a.title}</div>
                      <div style={{fontSize:8,color:'var(--slate)'}}>{typeLabel[a.type]||a.type}</div>
                    </div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0,marginLeft:8}}>
                      <span style={{fontFamily:'var(--sans)',fontSize:16,fontWeight:800,color:sevColor(a.severity)}}>{a.risk}</span>
                      <span style={{fontSize:7,padding:'1px 5px',borderRadius:3,background:sevBg(a.severity),color:sevColor(a.severity),fontWeight:700}}>{a.severity}</span>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                    {a.evidence&&a.evidence.slice(0,3).map((ev,j)=>(
                      <span key={j} style={{fontSize:7,padding:'1px 5px',background:'var(--bg3)',borderRadius:3,color:'var(--muted)'}}>{ev.slice(0,24)}</span>
                    ))}
                    {a.status==='REVIEWED'&&<span style={{fontSize:7,padding:'1px 5px',background:'rgba(20,184,166,.15)',borderRadius:3,color:'var(--teal)',marginLeft:'auto'}}>Revisada</span>}
                  </div>
                </div>
              ))}
            </div>

            <div className="split-right">
              {!selAlert&&<div className="center" style={{height:'100%',opacity:.4,flexDirection:'column',gap:8}}><div style={{fontSize:32}}>🛡</div><div style={{fontSize:10,color:'var(--slate)'}}>Selecciona una alerta</div></div>}
              {selAlert&&(
                <div style={{padding:'16px'}}>
                  <div style={{background:'var(--bg2)',border:'1px solid '+sevColor(selAlert.severity)+'30',borderLeft:'3px solid '+sevColor(selAlert.severity),borderRadius:8,padding:'14px',marginBottom:12}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <div>
                        <div style={{fontSize:12,color:'var(--white)',fontWeight:700,marginBottom:4}}>{selAlert.title}</div>
                        <div style={{fontSize:9,color:'var(--slate)'}}>{selAlert.detail}</div>
                      </div>
                      <div style={{textAlign:'right',flexShrink:0,marginLeft:12}}>
                        <div style={{fontFamily:'var(--sans)',fontSize:28,fontWeight:800,color:sevColor(selAlert.severity)}}>{selAlert.risk}</div>
                        <span style={{fontSize:8,padding:'3px 9px',borderRadius:4,fontWeight:700,background:sevBg(selAlert.severity),color:sevColor(selAlert.severity)}}>{selAlert.severity}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8}}>
                      <span style={{fontSize:8,padding:'2px 8px',background:'var(--bg3)',borderRadius:3,color:'var(--muted)'}}>{typeLabel[selAlert.type]||selAlert.type}</span>
                      <span style={{fontSize:8,padding:'2px 8px',background:selAlert.status==='PENDING'?'rgba(245,158,11,.1)':'rgba(20,184,166,.1)',borderRadius:3,color:selAlert.status==='PENDING'?'var(--amber)':'var(--teal)'}}>{selAlert.status}</span>
                    </div>
                  </div>

                  {selAlert.accounts&&selAlert.accounts.length>0&&(
                    <div style={{marginBottom:10}}>
                      <div className="card-title" style={{marginBottom:6}}>Cuentas afectadas ({selAlert.accounts.length})</div>
                      {selAlert.accounts.map((a,i)=>(
                        <div key={i} style={{fontSize:9,padding:'4px 8px',background:'rgba(255,59,92,.08)',borderRadius:4,marginBottom:3,fontFamily:'var(--mono)',color:'var(--light)'}}>{a}</div>
                      ))}
                    </div>
                  )}

                  {selAlert.ips&&selAlert.ips.length>0&&(
                    <div style={{marginBottom:10}}>
                      <div className="card-title" style={{marginBottom:6}}>IPs relacionadas</div>
                      {selAlert.ips.map((ip,i)=>(
                        <div key={i} style={{fontSize:9,padding:'4px 8px',background:'rgba(245,158,11,.08)',borderRadius:4,marginBottom:3,fontFamily:'var(--mono)',color:'var(--amber)'}}>{ip}</div>
                      ))}
                    </div>
                  )}

                  {selAlert.evidence&&selAlert.evidence.length>0&&(
                    <div style={{marginBottom:12}}>
                      <div className="card-title" style={{marginBottom:6}}>Evidencia</div>
                      <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                        {selAlert.evidence.map((ev,i)=>(
                          <span key={i} style={{fontSize:8,padding:'2px 8px',background:'var(--bg3)',borderRadius:3,color:'var(--muted)',border:'1px solid var(--border2)'}}>{ev.slice(0,32)}</span>
                        ))}
                      </div>
                    </div>
                  )}

                  {selAlert.status==='PENDING'&&(
                    <button className="btn btn-teal" style={{width:'100%',padding:'10px'}} onClick={()=>markReviewed(selAlert.id)}>
                      Marcar como revisada
                    </button>
                  )}
                  {selAlert.status==='REVIEWED'&&selAlert.reviewed_at&&(
                    <div style={{fontSize:8,color:'var(--teal)',textAlign:'center',padding:'8px',background:'rgba(20,184,166,.08)',borderRadius:6}}>
                      Revisada: {new Date(selAlert.reviewed_at).toLocaleString('es-EC')}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </>
      )}
    </div>
  );
}


function App() {
  const [page,setPage]=useState('dashboard');
  const [apiUrl,setApiUrl]=useState(API_BASE);
  const [apiOk,setApiOk]=useState(null);
  const [entity,setEntity]=useState('DEMO');
  const [entities,setEntities]=useState([]);
  const [pending,setPending]=useState(0);
  const [toast,setToast]=useState(null);
  const [deviceAlerts,setDeviceAlerts]=useState(()=>{
    try{const s=localStorage.getItem('device_alerts');return s?JSON.parse(s):[];}catch(e){return [];}
  });
  const [user,setUser]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('auth_user'));}catch(e){return null;}
  });
  const [authed,setAuthed]=useState(()=>!!localStorage.getItem('auth_token'));

  const showToast=useCallback((msg,type='ok')=>{
    setToast({msg,type});setTimeout(()=>setToast(null),3500);
  },[]);

  const onLogin=useCallback((u,token)=>{setUser(u);setAuthed(true);AUTH_TOKEN=token;},[]);

  const logout=useCallback(()=>{
    localStorage.removeItem('auth_token');localStorage.removeItem('auth_user');
    AUTH_TOKEN=null;setUser(null);setAuthed(false);
  },[]);

  const testApi=useCallback(async(url)=>{
    setApiOk('testing');
    try{API_BASE=url;localStorage.setItem('api_base',url);await api('/health');setApiOk('ok');}
    catch(e){setApiOk('err');}
  },[]);

  const loadEntities=useCallback(async()=>{
    try{
      const d=await api('/api/v2/entities');
      setEntities(d.entities);
      if(d.entities.length&&!d.entities.find(e=>e.code===entity))setEntity(d.entities[0].code);
    }catch(e){}
  },[entity]);

  const loadPending=useCallback(async()=>{
    try{
      const d=await api('/api/v2/alerts?status=PENDING&limit=1'+(entity?'&entity_code='+entity:''));
      setPending(d.total);
    }catch(e){}
  },[entity]);

  useEffect(()=>{
    testApi(apiUrl);
    const t=setInterval(()=>{loadEntities();loadPending();},8000);
    loadEntities();loadPending();
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{loadPending();},[entity,page]);

  const onDeviceResult=useCallback((r)=>{
    if(!r.alerts||!r.alerts.length)return;
    setDeviceAlerts(prev=>{
      const stamped=r.alerts.map(a=>({...a,created_at:a.created_at||new Date().toISOString()}));
      const merged=[...stamped,...prev];
      try{localStorage.setItem('device_alerts',JSON.stringify(merged.slice(0,500)));}catch(e){}
      return merged.slice(0,500);
    });
    showToast('🚨 '+r.alerts.length+' alertas guardadas en Otras Alertas','ok');
    setTimeout(()=>setPage('other_alerts'),1200);
  },[showToast]);

  const devicePending=deviceAlerts.filter(a=>a.status==='PENDING').length;
  const totalBadge=pending+devicePending;

  const nav=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'alerts',icon:'🔔',label:'Alertas',badge:totalBadge},
    {id:'other_alerts',icon:'🛡',label:'Otras Alertas',badge:devicePending},
    {id:'profiles',icon:'👤',label:'Perfiles'},
    {id:'upload',icon:'📤',label:'Carga Masiva'},
    {id:'entities',icon:'🏛',label:'Entidades'},
    {id:'model',icon:'🤖',label:'Modelo ML'},
  ];

  const activeEntity=user&&user.role!=='superadmin'&&user.entity_code?user.entity_code:entity;

  if(!authed){
    return <LoginScreen onLogin={onLogin} apiUrl={apiUrl} setApiUrl={setApiUrl} testApi={testApi} apiOk={apiOk}/>;
  }

  if(page==='admin'){
    return(
      <div style={{background:'var(--bg)',minHeight:'100vh'}}>
        <div className="topbar" style={{display:'flex',alignItems:'center',padding:'0 20px',gap:14,background:'var(--bg2)',borderBottom:'1px solid var(--border)',height:52}}>
          <div className="logo">Fraud<em>&</em>AML <span style={{color:'var(--slate)',fontWeight:400,fontSize:12}}>Platform</span></div>
          <div style={{flex:1}}/>
          <span style={{fontSize:10,color:'var(--slate)'}}>Admin: {user&&user.name}</span>
          <button onClick={logout} style={{padding:'4px 12px',background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--slate)',borderRadius:5,fontSize:10,fontFamily:'var(--mono)'}}>Cerrar sesion</button>
        </div>
        <AdminPanel showToast={showToast} onBack={()=>setPage('dashboard')}/>
        {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      </div>
    );
  }

  return(
    <div className="app">
      <div className="topbar">
        <div className="logo">Fraud<em>&</em>AML <span style={{color:'var(--slate)',fontWeight:400,fontSize:12}}>Platform</span></div>
        <div className="topbar-api">
          <input className="api-input" value={apiUrl} onChange={e=>setApiUrl(e.target.value)} onBlur={()=>testApi(apiUrl)} onKeyDown={e=>e.key==='Enter'&&testApi(apiUrl)} placeholder="URL del backend (Railway)"/>
          <span className={'api-badge '+(apiOk==='ok'?'api-ok':apiOk==='err'?'api-err':'api-testing')}>
            {apiOk==='ok'?'CONECTADO':apiOk==='err'?'ERROR':'PROBANDO'}
          </span>
        </div>
        <div className="topbar-right">
          <div className="pulse"/><span>LIVE</span>
          <span style={{color:'var(--border2)'}}>|</span>
          <span style={{color:'var(--teal)',fontSize:9}}>{user&&user.name} - {user&&user.role}</span>
          {user&&user.role==='superadmin'&&(
            <button onClick={()=>setPage('admin')} style={{padding:'3px 10px',background:'var(--purple3)',border:'1px solid rgba(168,85,247,.3)',color:'var(--purple)',borderRadius:4,fontSize:9,fontFamily:'var(--mono)'}}>
              Usuarios
            </button>
          )}
          <button onClick={logout} style={{padding:'3px 10px',background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--slate)',borderRadius:4,fontSize:9,fontFamily:'var(--mono)'}}>
            Salir
          </button>
        </div>
      </div>

      <div className="sidebar">
        <div className="sidebar-entity">
          <div className="entity-label">Entidad activa</div>
          {user&&user.role==='superadmin'?(
            <select className="entity-select" value={entity} onChange={e=>setEntity(e.target.value)}>
              {entities.map(e=><option key={e.id} value={e.code}>{e.name}</option>)}
              {entities.length===0&&<option value="DEMO">DEMO (cargando...)</option>}
            </select>
          ):(
            <div className="entity-select" style={{padding:'6px 10px',fontSize:11,color:'var(--teal)',cursor:'default'}}>
              {user&&user.entity_code||'Sin entidad'}
            </div>
          )}
        </div>
        {nav.map(n=>(
          <div key={n.id} className={'nav-item '+(page===n.id?'active':'')} onClick={()=>setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            {n.label}
            {n.badge>0&&<span className="nav-badge">{n.badge}</span>}
          </div>
        ))}
        <div style={{marginTop:'auto',padding:'10px 14px',fontSize:8,color:'var(--slate)',borderTop:'1px solid var(--border)'}}>
          <div>Score: 0-999</div>
          <div style={{marginTop:2}}>Modelo: GradientBoosting</div>
        </div>
      </div>

      <div className="main">
        {page==='dashboard'&&<Dashboard entity={activeEntity} toast={showToast}/>}
        {page==='alerts'&&<Alerts entity={activeEntity} showToast={showToast}/>}
        {page==='other_alerts'&&<OtherAlerts alerts={deviceAlerts} setAlerts={setDeviceAlerts} showToast={showToast}/>}
        {page==='profiles'&&<Profiles entity={activeEntity} showToast={showToast}/>}
        {page==='upload'&&<UploadPage entity={activeEntity} showToast={showToast} onDeviceResult={onDeviceResult}/>}
        {page==='entities'&&<Entities onEntityChange={loadEntities} showToast={showToast}/>}
        {page==='model'&&<ModelPage entity={activeEntity} showToast={showToast}/>}
      </div>

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
