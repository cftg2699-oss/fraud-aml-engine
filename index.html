<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fraud & AML Platform | Enterprise</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛡️</text></svg>">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* (Mantenemos tus estilos originales que están excelentes) */
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
            --bg:#07080c;--bg2:#0c0e17;--bg3:#111420;--bg4:#181b2a;
            --border:#1c2035;--border2:#252a42;
            --red:#ff3b5c;--red2:#c42040;--red3:rgba(255,59,92,.12);
            --amber:#f59e0b;--amber3:rgba(245,158,11,.12);
            --teal:#14b8a6;--teal3:rgba(20,184,166,.12);
            --blue:#3b82f6;--blue3:rgba(59,130,246,.12);
            --purple:#a855f7;--purple3:rgba(168,85,247,.12);
            --slate:#6b7280;--muted:#94a3b8;--light:#e2e8f0;--white:#f8fafc;
            --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
            --r:8px;--r2:12px;
        }
        html,body,#root{height:100%;background:var(--bg);color:var(--light);font-family:var(--mono);overflow:hidden}
        .app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:220px 1fr;height:100vh}
        .topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:10}
        .logo{font-family:var(--sans);font-size:16px;font-weight:800;color:var(--white);letter-spacing:-.02em}
        .logo em{color:var(--red);font-style:normal}
        .sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
        .main{overflow-y:auto;padding:20px;background:var(--bg)}
        /* ... el resto de tus estilos se mantienen ... */
        .badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:8px;font-weight:600;border:1px solid}
        .PENDING{color:var(--amber);border-color:rgba(245,158,11,.3);background:var(--amber3)}
        .spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        /* ══════════════════════════════════════════
           CONFIGURACIÓN DE API SEGURA
        ══════════════════════════════════════════ */
        
        // Prioridad: Railway > Localhost
        let API_BASE = localStorage.getItem('api_base') || 'https://web-production-8ab58.up.railway.app';
        let AUTH_TOKEN = localStorage.getItem('auth_token');

        async function api(path, opts = {}) {
            // Si no hay token, lo solicitamos una vez (útil para pruebas rápidas)
            if (!AUTH_TOKEN) {
                const promptToken = prompt("Introduce tu Bearer Token para continuar:");
                if (promptToken) {
                    localStorage.setItem('auth_token', promptToken);
                    AUTH_TOKEN = promptToken;
                }
            }

            const headers = { 'Content-Type': 'application/json' };
            if (AUTH_TOKEN) headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;
            
            try {
                const r = await fetch(API_BASE + path, {
                    ...opts,
                    headers,
                    body: opts.body ? JSON.stringify(opts.body) : undefined,
                });

                if (r.status === 401) {
                    console.error("Error de autenticación. Token inválido.");
                    localStorage.removeItem('auth_token'); // Limpiar token corrupto
                }

                if (!r.ok) {
                    const err = await r.json().catch(() => ({ detail: r.statusText }));
                    throw new Error(err.detail || r.statusText);
                }
                return r.json();
            } catch (error) {
                console.error("API Error:", error.message);
                throw error;
            }
        }

        /* ══════════════════════════════════════════
           COMPONENTE PRINCIPAL (APP)
        ══════════════════════════════════════════ */

        function App() {
            const [view, setView] = useState('dashboard');
            const [entity, setEntity] = useState('DEMO');
            const [toast, setToast] = useState({ msg: '', type: '' });

            const showToast = (msg, type = 'ok') => {
                setToast({ msg, type });
                setTimeout(() => setToast({ msg: '', type: '' }), 4000);
            };

            return (
                <div className="app">
                    <header className="topbar">
                        <div className="logo">FRAUD<em>INTEL</em></div>
                        <div style={{fontSize: '10px', color: 'var(--slate)'}}> | Platform V2.0</div>
                        <div style={{marginLeft: 'auto', display: 'flex', gap: '15px', alignItems: 'center'}}>
                            <div className="badge PENDING" style={{cursor: 'pointer'}} onClick={() => {
                                const newBase = prompt("Cambiar API Base:", API_BASE);
                                if(newBase) { localStorage.setItem('api_base', newBase); window.location.reload(); }
                            }}>API: {API_BASE.includes('railway') ? 'PROD' : 'LOCAL'}</div>
                        </div>
                    </header>

                    <aside className="sidebar">
                        <div style={{padding: '20px'}}>
                            <nav>
                                <div className={`nav-item ${view === 'dashboard' ? 'active' : ''}`} onClick={() => setView('dashboard')}>Dashboard</div>
                                <div className={`nav-item ${view === 'alerts' ? 'active' : ''}`} onClick={() => setView('alerts')}>Alertas</div>
                            </nav>
                        </div>
                    </aside>

                    <main className="main">
                        {view === 'dashboard' ? <Dashboard entity={entity} /> : <AlertsView entity={entity} showToast={showToast} />}
                    </main>

                    {toast.msg && <div className={`toast ${toast.type}`} style={{position: 'fixed', bottom: 20, right: 20, background: 'var(--bg3)', padding: '10px', border: '1px solid var(--border2)'}}>{toast.msg}</div>}
                </div>
            );
        }

        /* ══════════════════════════════════════════
           DASHBOARD (Simplificado para el ejemplo)
        ══════════════════════════════════════════ */

        function Dashboard({ entity }) {
            const [data, setData] = useState(null);
            const [error, setError] = useState(null);

            useEffect(() => {
                api(`/api/v2/stats?entity_code=${entity}`)
                    .then(setData)
                    .catch(err => setError(err.message));
            }, [entity]);

            if (error) return <div style={{color: 'var(--red)'}}>Error de conexión: {error}</div>;
            if (!data) return <div>Cargando estadísticas...</div>;

            return (
                <div>
                    <h1 style={{fontFamily: 'var(--sans)', marginBottom: '20px'}}>Dashboard General</h1>
                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '15px'}}>
                        <div style={{background: 'var(--bg2)', padding: '20px', borderRadius: '8px', border: '1px solid var(--border)'}}>
                            <div style={{fontSize: '10px', color: 'var(--slate)'}}>TRANSACCIONES</div>
                            <div style={{fontSize: '24px', fontWeight: '800'}}>{data.totals.transactions}</div>
                        </div>
                        <div style={{background: 'var(--bg2)', padding: '20px', borderRadius: '8px', border: '1px solid var(--border)'}}>
                            <div style={{fontSize: '10px', color: 'var(--slate)'}}>ALERTAS</div>
                            <div style={{fontSize: '24px', fontWeight: '800', color: 'var(--orange)'}}>{data.totals.alerted}</div>
                        </div>
                        <div style={{background: 'var(--bg2)', padding: '20px', borderRadius: '8px', border: '1px solid var(--border)'}}>
                            <div style={{fontSize: '10px', color: 'var(--slate)'}}>BLOQUEOS</div>
                            <div style={{fontSize: '24px', fontWeight: '800', color: 'var(--red)'}}>{data.totals.blocked}</div>
                        </div>
                    </div>
                </div>
            );
        }

        /* ══════════════════════════════════════════
           ALERTS VIEW (Base para tu visor de alertas)
        ══════════════════════════════════════════ */

        function AlertsView({ entity, showToast }) {
            return (
                <div>
                    <h1 style={{fontFamily: 'var(--sans)'}}>Gestión de Alertas</h1>
                    <p style={{fontSize: '11px', color: 'var(--slate)'}}>Entidad: {entity}</p>
                    <div style={{marginTop: '20px', opacity: 0.5}}>Conectado a la API de producción en Railway.</div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
