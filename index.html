<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fraud & AML Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080c;--bg2:#0c0e17;--bg3:#111420;--bg4:#181b2a;
  --border:#1c2035;--border2:#252a42;
  --red:#ff3b5c;--red2:#c42040;--red3:rgba(255,59,92,.12);
  --amber:#f59e0b;--amber3:rgba(245,158,11,.12);
  --teal:#14b8a6;--teal3:rgba(20,184,166,.12);
  --blue:#3b82f6;--blue3:rgba(59,130,246,.12);
  --purple:#a855f7;--purple3:rgba(168,85,247,.12);
  --orange:#f97316;--green:#22c55e;
  --slate:#6b7280;--muted:#94a3b8;--light:#e2e8f0;--white:#f8fafc;
  --mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
  --r:8px;--r2:12px;
}
html,body,#root{height:100%;background:var(--bg);color:var(--light);font-family:var(--mono);overflow:hidden}
button{font-family:var(--mono);cursor:pointer}
input,select,textarea{font-family:var(--mono);background:var(--bg3);border:1px solid var(--border2);color:var(--light);border-radius:5px;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* LAYOUT */
.app{display:grid;grid-template-rows:52px 36px 1fr;grid-template-columns:220px 1fr;height:100vh}
.topbar{grid-column:1/-1;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:14px;z-index:10}
.channelbar{grid-column:1/-1;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:6px;z-index:9}
.logo{font-family:var(--sans);font-size:16px;font-weight:800;color:var(--white);letter-spacing:-.02em;white-space:nowrap}
.logo em{color:var(--red);font-style:normal}
.topbar-api{flex:1;display:flex;align-items:center;gap:8px;margin:0 16px}
.api-input{flex:1;padding:5px 10px;font-size:10px;letter-spacing:.03em;max-width:380px}
.api-badge{padding:3px 8px;border-radius:4px;font-size:8px;font-weight:600;letter-spacing:.1em;border:1px solid}
.api-ok{color:var(--teal);border-color:rgba(20,184,166,.3);background:var(--teal3)}
.api-err{color:var(--red);border-color:rgba(255,59,92,.3);background:var(--red3)}
.api-testing{color:var(--amber);border-color:rgba(245,158,11,.3);background:var(--amber3)}
.topbar-right{display:flex;gap:10px;align-items:center;font-size:9px;color:var(--slate)}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* CHANNEL FILTER BAR */
.ch-btn{padding:3px 10px;border-radius:4px;border:1px solid;font-size:8px;font-weight:600;letter-spacing:.08em;cursor:pointer;transition:all .15s;background:transparent}
.ch-btn.active{color:#000;border-color:transparent}
.ch-ALL{color:var(--muted);border-color:var(--border2)}.ch-ALL.active{background:var(--muted)}
.ch-CARD{color:#60a5fa;border-color:rgba(96,165,250,.3)}.ch-CARD.active{background:#60a5fa}
.ch-TRANSFER{color:var(--purple);border-color:rgba(168,85,247,.3)}.ch-TRANSFER.active{background:var(--purple)}
.ch-ATM{color:var(--amber);border-color:rgba(245,158,11,.3)}.ch-ATM.active{background:var(--amber)}
.ch-WALLET{color:var(--teal);border-color:rgba(20,184,166,.3)}.ch-WALLET.active{background:var(--teal)}
.ch-DIGITAL_BANKING{color:var(--green);border-color:rgba(34,197,94,.3)}.ch-DIGITAL_BANKING.active{background:var(--green)}
.ch-label{font-size:8px;color:var(--slate);letter-spacing:.1em;margin-right:4px}

/* SIDEBAR */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-entity{padding:10px 14px;border-bottom:1px solid var(--border);font-size:9px}
.entity-label{color:var(--slate);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.entity-select{width:100%;padding:5px 8px;font-size:10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:11px;color:var(--muted);border-left:2px solid transparent;transition:all .15s}
.nav-item:hover{color:var(--light);background:var(--bg3)}
.nav-item.active{color:var(--white);background:var(--bg3);border-left-color:var(--red)}
.nav-icon{font-size:14px;width:18px;text-align:center}
.nav-badge{margin-left:auto;min-width:18px;height:16px;background:var(--red2);color:#fff;border-radius:8px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 4px}

/* MAIN */
.main{overflow-y:auto;padding:20px;background:var(--bg)}
.page-title{font-family:var(--sans);font-size:20px;font-weight:700;color:var(--white);margin-bottom:4px}
.page-sub{font-size:10px;color:var(--slate);margin-bottom:20px}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px 18px}
.card-title{font-size:8px;color:var(--slate);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.card-val{font-family:var(--sans);font-size:28px;font-weight:800;color:var(--white);line-height:1}
.card-accent{height:2px;border-radius:2px;margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;font-size:8px;font-weight:600;letter-spacing:.07em;border:1px solid;white-space:nowrap}
.CRITICAL,.BLOQUEADA,.FRAUD{color:var(--red);border-color:rgba(255,59,92,.35);background:var(--red3)}
.HIGH,.REVISIÓN{color:var(--amber);border-color:rgba(245,158,11,.35);background:var(--amber3)}
.MEDIUM,.ALERTA{color:var(--orange);border-color:rgba(249,115,22,.35);background:rgba(249,115,22,.1)}
.LOW,.APROBADA,.CLEAN{color:var(--teal);border-color:rgba(20,184,166,.35);background:var(--teal3)}
.CONFIRMED_FRAUD{color:var(--red);border-color:rgba(255,59,92,.45);background:rgba(255,59,92,.18)}
.FALSE_POSITIVE{color:var(--teal);border-color:rgba(20,184,166,.45);background:rgba(20,184,166,.18)}
.PENDING{color:var(--amber);border-color:rgba(245,158,11,.3);background:var(--amber3)}
.UNDER_REVIEW{color:var(--blue);border-color:rgba(59,130,246,.3);background:var(--blue3)}
.UNKNOWN{color:var(--slate);border-color:var(--border2);background:var(--bg3)}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:10px}
.tbl th{padding:7px 10px;text-align:left;color:var(--slate);border-bottom:1px solid var(--border);font-size:8px;letter-spacing:.1em;font-weight:400;text-transform:uppercase}
.tbl td{padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.03)}
.tbl tr:hover td{background:var(--bg3);cursor:pointer}
.tbl .mono{font-size:9px;color:var(--slate)}

/* SCORE BAR */
.sbar{height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;position:relative}
.sbar-fill{height:100%;border-radius:3px;transition:width .4s}

/* FORMS */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:8px;color:var(--slate);letter-spacing:.1em;text-transform:uppercase}
.form-input{padding:7px 10px;font-size:10px}
.form-select{padding:7px 10px;font-size:10px}
.btn{padding:8px 16px;border-radius:5px;border:none;font-size:10px;font-weight:600;letter-spacing:.06em;transition:all .2s;cursor:pointer}
.btn-red{background:var(--red2);color:#fff}.btn-red:hover{background:var(--red)}
.btn-teal{background:rgba(20,184,166,.15);color:var(--teal);border:1px solid rgba(20,184,166,.3)}.btn-teal:hover{background:rgba(20,184,166,.25)}
.btn-ghost{background:var(--bg3);color:var(--muted);border:1px solid var(--border2)}.btn-ghost:hover{color:var(--light)}
.btn-amber{background:rgba(245,158,11,.15);color:var(--amber);border:1px solid rgba(245,158,11,.3)}.btn-amber:hover{background:rgba(245,158,11,.25)}
.btn-purple{background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.3)}.btn-purple:hover{background:rgba(168,85,247,.25)}
.btn:disabled{opacity:.4;cursor:default}

/* MISC */
.sec{font-size:8px;letter-spacing:.15em;color:var(--slate);text-transform:uppercase;margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.feed-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);transition:background .1s}
.feed-item:hover{background:var(--bg3)}
.feed-score{font-family:var(--sans);font-size:16px;font-weight:800;min-width:38px;text-align:right}
.feed-meta{flex:1;min-width:0}
.feed-txid{font-size:9px;color:var(--slate)}
.feed-detail{font-size:10px;color:var(--light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.split{display:grid;grid-template-columns:1fr 360px;gap:0;height:calc(100vh - 88px);overflow:hidden}
.split-left{overflow-y:auto;padding:16px}
.split-right{background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.center{display:flex;align-items:center;justify-content:center;height:200px;color:var(--slate);font-size:11px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;font-size:10px;border:1px solid;z-index:999;animation:slideup .25s ease;pointer-events:none}
.toast-ok{background:var(--bg3);color:var(--teal);border-color:rgba(20,184,166,.4)}
.toast-err{background:var(--bg3);color:var(--red);border-color:rgba(255,59,92,.4)}
@keyframes slideup{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.pstat{background:var(--bg3);border-radius:5px;padding:8px 10px}
.pstat-val{font-family:var(--sans);font-size:18px;font-weight:800;line-height:1}
.pstat-lbl{font-size:8px;color:var(--slate);margin-top:2px;letter-spacing:.06em}
.fb-btn{padding:9px 12px;border-radius:5px;border:1px solid;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:.05em;transition:all .2s;text-align:center}
.fb-fraud{border-color:var(--red2);color:var(--red);background:var(--red3)}.fb-fraud.sel,.fb-fraud:hover{background:rgba(255,59,92,.25);border-color:var(--red)}
.fb-fp{border-color:rgba(20,184,166,.3);color:var(--teal);background:var(--teal3)}.fb-fp.sel,.fb-fp:hover{background:rgba(20,184,166,.25);border-color:var(--teal)}
.fb-review{border-color:rgba(59,130,246,.3);color:var(--blue);background:var(--blue3)}.fb-review.sel,.fb-review:hover{background:rgba(59,130,246,.25);border-color:var(--blue)}
.trend-bar{display:flex;align-items:flex-end;gap:4px;height:60px}
.trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.trend-bar-inner{width:100%;border-radius:2px 2px 0 0;min-height:2px;transition:height .4s}
/* GRAPH */
.graph-svg{width:100%;height:100%}
.node-circle{cursor:pointer;transition:r .2s}
.node-circle:hover{stroke-width:3}
.node-label{font-size:9px;fill:#94a3b8;pointer-events:none}
/* RULES EDITOR */
.rule-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-bottom:1px solid var(--border);font-size:10px}
.rule-row:hover{background:var(--bg3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef,useMemo} = React;

/* ══════════ API CLIENT ══════════ */
let API_BASE = localStorage.getItem('api_base') || 'https://web-production-8ab58.up.railway.app';
let AUTH_TOKEN = localStorage.getItem('auth_token') || null;
function getToken(){return AUTH_TOKEN||localStorage.getItem('auth_token');}
async function api(path,opts={}){
  const token=getToken();
  const headers={'Content-Type':'application/json'};
  if(token) headers['Authorization']='Bearer '+token;
  if(opts.headers) Object.assign(headers,opts.headers);
  const r=await fetch(API_BASE+path,{...opts,headers,body:opts.body?JSON.stringify(opts.body):undefined});
  if(!r.ok){const e=await r.json().catch(()=>({detail:r.statusText}));throw new Error(e.detail||r.statusText);}
  return r.json();
}

/* ══════════ HELPERS ══════════ */
function scoreColor(s){if(s>=800)return'var(--red)';if(s>=600)return'var(--amber)';if(s>=400)return'var(--orange)';return'var(--teal)';}
function scoreGrad(s){if(s>=800)return'linear-gradient(90deg,#c42040,#ff3b5c)';if(s>=600)return'linear-gradient(90deg,#d97706,#f59e0b)';if(s>=400)return'linear-gradient(90deg,#ea580c,#f97316)';return'linear-gradient(90deg,#0d9488,#14b8a6)';}
function fmtAmt(v){return'$'+Number(v).toLocaleString('en',{minimumFractionDigits:2});}
function fmtDate(s){return new Date(s).toLocaleString('es-EC',{dateStyle:'short',timeStyle:'short'});}
function Spinner(){return <span className="spinner"/>;}
function Loading(){return<div className="center"><Spinner/>Cargando...</div>;}
function Toast({msg,type}){return msg?<div className={`toast toast-${type}`}>{msg}</div>:null;}
function ScoreBar({score,max=999}){const pct=(score/max)*100;return(<div><div style={{display:'flex',justifyContent:'space-between',fontSize:8,color:'var(--slate)',marginBottom:3}}><span>0</span><span style={{color:'var(--orange)'}}>400</span><span style={{color:'var(--amber)'}}>600</span><span style={{color:'var(--red)'}}>800</span><span>999</span></div><div className="sbar">{[400,600,800].map(t=><div key={t} style={{position:'absolute',left:`${(t/999)*100}%`,top:0,bottom:0,width:1,background:'rgba(255,255,255,.1)',zIndex:1}}/>)}<div className="sbar-fill" style={{width:`${pct}%`,background:scoreGrad(score)}}/></div></div>);}

const CHANNELS = ['ALL','CARD','TRANSFER','ATM','WALLET','DIGITAL_BANKING'];
const CH_ICONS = {ALL:'🌐',CARD:'💳',TRANSFER:'🏦',ATM:'🏧',WALLET:'📱',DIGITAL_BANKING:'🌐'};

/* ══════════ CHANNEL BAR ══════════ */
function ChannelBar({channel, setChannel}){
  return(
    <div className="channelbar">
      <span className="ch-label">CANAL:</span>
      {CHANNELS.map(ch=>(
        <button key={ch} className={`ch-btn ch-${ch} ${channel===ch?'active':''}`} onClick={()=>setChannel(ch)}>
          {CH_ICONS[ch]} {ch==='ALL'?'Todos':ch==='DIGITAL_BANKING'?'Digital':ch}
        </button>
      ))}
      {channel!=='ALL'&&<span style={{marginLeft:'auto',fontSize:8,color:'var(--slate)'}}>Filtrando por canal: <strong style={{color:'var(--white)'}}>{channel}</strong></span>}
    </div>
  );
}

/* ══════════ DASHBOARD ══════════ */
function Dashboard({entity,channel,toast}){
  const [stats,setStats]=useState(null);
  const [feed,setFeed]=useState([]);
  const [loading,setLoad]=useState(true);
  const chParam = channel&&channel!=='ALL'?`&channel=${channel}`:'';
  const load=useCallback(async()=>{
    try{
      const[s,f]=await Promise.all([
        api(`/api/v2/stats${entity?`?entity_code=${entity}`:''}`),
        api(`/api/v2/feed?limit=30${entity?`&entity_code=${entity}`:''}${chParam}`),
      ]);
      setStats(s);setFeed(f.data);setLoad(false);
    }catch(e){setLoad(false);}
  },[entity,channel]);
  useEffect(()=>{load();const t=setInterval(load,5000);return()=>clearInterval(t);},[load]);
  if(loading)return<Loading/>;
  if(!stats)return<div className="center">No se pudo conectar al backend.</div>;
  const T=stats.totals;
  const maxTrend=Math.max(...(stats.trend_7d||[]).map(d=>d.total),1);
  const channels = stats.by_channel||{};
  return(
    <div>
      <div className="page-title">Dashboard {channel!=='ALL'&&<span style={{color:scoreColor(200),fontSize:14}}>· {channel}</span>}</div>
      <div className="page-sub">Actualización automática cada 5 segundos</div>
      <div className="grid-5" style={{marginBottom:16}}>
        {[['Total TX',T.transactions,'var(--teal)'],['Aprobadas',T.approved,'var(--teal)'],['Alertas',T.alerted,'var(--orange)'],['En Revisión',T.review,'var(--amber)'],['Bloqueadas',T.blocked,'var(--red)']].map(([l,v,c])=>(
          <div className="card" key={l}><div className="card-accent" style={{background:c}}/><div className="card-title">{l}</div><div className="card-val" style={{color:c}}>{v.toLocaleString()}</div></div>
        ))}
      </div>
      <div className="grid-3" style={{marginBottom:16}}>
        <div className="card"><div className="card-title">Tasas del sistema</div>
          {[['Aprobación',stats.rates.approval,'var(--teal)'],['Revisión',stats.rates.review,'var(--amber)'],['Bloqueo',stats.rates.block,'var(--red)']].map(([l,v,c])=>(
            <div key={l} style={{marginBottom:8}}><div style={{display:'flex',justifyContent:'space-between',fontSize:9,marginBottom:3}}><span style={{color:'var(--slate)'}}>{l}</span><span style={{color:c,fontWeight:600}}>{v}%</span></div><div style={{height:4,background:'var(--bg4)',borderRadius:2,overflow:'hidden'}}><div style={{width:`${v}%`,height:'100%',background:c,borderRadius:2}}/></div></div>
          ))}
        </div>
        <div className="card"><div className="card-title">Alertas por estado</div>
          {[['Pendientes',stats.alerts.pending,'var(--amber)'],['Fraude confirmado',stats.alerts.confirmed_fraud,'var(--red)'],['Falso positivo',stats.alerts.false_positives,'var(--teal)']].map(([l,v,c])=>(
            <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:'1px solid rgba(255,255,255,.04)',fontSize:10}}><span style={{color:'var(--muted)'}}>{l}</span><span style={{color:c,fontFamily:'var(--sans)',fontWeight:700}}>{v}</span></div>
          ))}
          <div style={{marginTop:8,fontSize:9,color:'var(--slate)'}}>Perfiles: <span style={{color:'var(--light)'}}>{stats.profiles.total}</span> · <span style={{color:'var(--red)'}}>{stats.profiles.fraud}</span> fraude · <span style={{color:'var(--teal)'}}>{stats.profiles.clean}</span> limpios</div>
        </div>
        <div className="card"><div className="card-title">Tendencia 7 días</div>
          <div className="trend-bar" style={{marginTop:8}}>
            {(stats.trend_7d||[]).map((d,i)=>(
              <div className="trend-col" key={i}><div className="trend-bar-inner" style={{height:`${Math.max((d.total/maxTrend)*48,2)}px`,background:d.blocked>0?'var(--red)':'var(--teal)',opacity:.8}} title={`${d.date}: ${d.total} TX`}/><span style={{fontSize:7,color:'var(--slate)'}}>{d.date}</span></div>
            ))}
          </div>
        </div>
      </div>
      <div className="card" style={{marginBottom:16}}>
        <div className="card-title">Distribución por canal</div>
        <div className="grid-6" style={{marginTop:8}}>
          {[['CARD','💳','#60a5fa'],['TRANSFER','🏦','var(--purple)'],['WALLET','📱','var(--teal)'],['ATM','🏧','var(--amber)'],['DIGITAL_BANKING','🌐','var(--green)'],['TOTAL','📊','var(--muted)']].map(([ch,ic,c])=>(
            <div key={ch} style={{background:'var(--bg3)',borderRadius:6,padding:'10px 12px',textAlign:'center',border:channel===ch?`1px solid ${c}`:'1px solid transparent'}}>
              <div style={{fontSize:18,marginBottom:4}}>{ic}</div>
              <div style={{fontFamily:'var(--sans)',fontSize:18,fontWeight:800,color:c}}>{ch==='TOTAL'?T.transactions.toLocaleString():(channels[ch]||0).toLocaleString()}</div>
              <div style={{fontSize:8,color:'var(--slate)',marginTop:2}}>{ch}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="card">

      setFileType(ft);
      const m={};
      Object.entries(detected.mapping||{}).forEach(([k,v])=>{if(v&&hdrs.includes(v))m[k]=v;});
      setMapping(m);
    }catch(e){
      // Fallback: detectar por nombres de columna
      const hdrsLow=hdrs.map(h=>h.toLowerCase());
      const isDevice=hdrsLow.some(h=>['device_id','fingerprint','device_fingerprint','session_id'].includes(h));
      setFileType(isDevice?'device':'transactional');
      const m={};
      const aliases_tx={amount:['amount','monto','valor','importe','total'],channel:['channel','canal','tipo'],cardholder:['cardholder','titular','nombre','name'],account_number:['account_number','cuenta','account','tarjeta'],tx_id:['tx_id','id','transaccion'],city:['city','ciudad'],datetime:['datetime','fecha','date']};
      const aliases_dev={device_id:['device_id','deviceid','device'],identity:['identity','id','account','cuenta','user_id'],session_id:['session_id','sessionid','session'],device_fingerprint:['device_fingerprint','fingerprint'],ips:['ips','ip','ip_address'],bank:['bank','banco'],os:['os','sistema','system'],browser:['browser','navegador'],screen:['screen','pantalla','resolution'],gpu_renderers:['gpu_renderers','gpu']};
      const alm=isDevice?aliases_dev:aliases_tx;
      Object.entries(alm).forEach(([field,names])=>{const match=hdrs.find(h=>names.includes(h.toLowerCase()));if(match)m[field]=match;});
      setMapping(m);
    }
    setAiAnalyzing(false);
  };

  // Análisis de dispositivos — todo en el frontend
  const analyzeDevices=()=>{
    const get=(row,field)=>{
      if(mapping[field]){const idx=headers.indexOf(mapping[field]);if(idx>=0)return String(row[idx]||'').trim();}
      return '';
    };

    // Construir índices
    const deviceToAccounts={};
    const accountToDevices={};
    const ipToAccounts={};
    const fingerprintToAccounts={};
    const sessionsByDevice={};

    allRows.forEach(row=>{
      const device=get(row,'device_id');
      const identity=get(row,'identity');
      const ipsRaw=get(row,'ips');
      const fp=get(row,'device_fingerprint');
      const session=get(row,'session_id');
      if(!device)return;
      if(!deviceToAccounts[device])deviceToAccounts[device]={accounts:new Set(),sessions:[],fps:new Set(),ips:new Set(),bank:get(row,'bank'),os:get(row,'os'),browser:get(row,'browser')};
      if(identity&&identity!=='-')deviceToAccounts[device].accounts.add(identity);
      if(session)deviceToAccounts[device].sessions.push(session);
      if(fp)deviceToAccounts[device].fps.add(fp);
      ipsRaw.split(',').forEach(ip=>{ip=ip.trim();if(ip){deviceToAccounts[device].ips.add(ip);if(!ipToAccounts[ip])ipToAccounts[ip]=new Set();if(identity&&identity!=='-')ipToAccounts[ip].add(identity);}});
      if(fp){if(!fingerprintToAccounts[fp])fingerprintToAccounts[fp]=new Set();if(identity&&identity!=='-')fingerprintToAccounts[fp].add(identity);}
      if(identity&&identity!=='-'){if(!accountToDevices[identity])accountToDevices[identity]=new Set();accountToDevices[identity].add(device);}
    });

    // Dispositivos sospechosos: usados por múltiples cuentas
    const suspiciousDevices=Object.entries(deviceToAccounts)
      .filter(([,v])=>v.accounts.size>1)
      .map(([device,v])=>{
        const riskScore=Math.min(999,200+v.accounts.size*80+(v.fps.size>1?100:0)+(v.ips.size>5?100:0));
        return{device,accounts:[...v.accounts],sessions:v.sessions.length,fingerprints:[...v.fps],ips:[...v.ips],bank:v.bank,os:v.os,browser:v.browser,risk:riskScore,level:riskScore>=700?'CRÍTICO':riskScore>=500?'ALTO':'MEDIO'};
      })
      .sort((a,b)=>b.accounts.length-a.accounts.length);

    // IPs compartidas sospechosas
    const suspiciousIPs=Object.entries(ipToAccounts)
      .filter(([,v])=>v.size>1)
      .map(([ip,accounts])=>({ip,accounts:[...accounts],count:accounts.size}))
      .sort((a,b)=>b.count-a.count)
      .slice(0,50);

    // Fingerprints duplicados
    const sharedFPs=Object.entries(fingerprintToAccounts)
      .filter(([,v])=>v.size>1)
      .map(([fp,accounts])=>({fp,accounts:[...accounts]}));

    // Cuentas con múltiples dispositivos
    const multiDeviceAccounts=Object.entries(accountToDevices)
      .filter(([,v])=>v.size>1)
      .map(([account,devices])=>({account,devices:[...devices],count:devices.size}))
      .sort((a,b)=>b.count-a.count);

    // ── Generar alertas automáticas ───────────────────────────────────────────
    const alerts = [];
    // Alerta por dispositivo compartido entre múltiples cuentas
    suspiciousDevices.forEach(d => {
      const severity = d.accounts.length >= 5 ? 'CRÍTICO' : d.accounts.length >= 3 ? 'ALTO' : 'MEDIO';
      alerts.push({
        id: 'DEV-' + d.device.slice(0,8).toUpperCase(),
        type: 'DEVICE_SHARING',
        title: 'Dispositivo compartido entre ' + d.accounts.length + ' cuentas',
        detail: 'El dispositivo ' + d.device.slice(0,20) + '… fue usado por ' + d.accounts.length + ' identidades distintas.',
        severity,
        risk: d.risk,
        accounts: d.accounts,
        evidence: [
          'Cuentas afectadas: ' + d.accounts.slice(0,3).join(', ') + (d.accounts.length>3?' y '+(d.accounts.length-3)+' más':''),
          'IPs registradas: ' + d.ips.length,
          'Sesiones: ' + d.sessions,
          'Score de riesgo: ' + d.risk + '/999',
        ],
        device: d.device,
        ips: d.ips,
      });
    });
    // Alerta por IP compartida entre muchas cuentas
    suspiciousIPs.filter(ip => ip.count >= 3).forEach(ip => {
      alerts.push({
        id: 'IP-' + ip.ip.replace(/\./g,'-'),
        type: 'SHARED_IP',
        title: 'IP compartida entre ' + ip.count + ' cuentas',
        detail: 'La IP ' + ip.ip + ' fue usada para acceder a ' + ip.count + ' cuentas distintas — posible proxy/VPN de fraude.',
        severity: ip.count >= 6 ? 'CRÍTICO' : ip.count >= 4 ? 'ALTO' : 'MEDIO',
        risk: Math.min(999, ip.count * 120),
        accounts: ip.accounts,
        evidence: [
          'IP: ' + ip.ip,
          'Cuentas conectadas: ' + ip.count,
          'Cuentas: ' + ip.accounts.slice(0,3).join(', ') + (ip.count>3?' y '+(ip.count-3)+' más':''),
        ],
        ip: ip.ip,
      });
    });
    // Alerta por fingerprint duplicado
    sharedFPs.forEach(fp => {
      alerts.push({
        id: 'FP-' + fp.fp.slice(0,8).toUpperCase(),
        type: 'DUPLICATE_FINGERPRINT',
        title: 'Fingerprint de dispositivo duplicado (' + fp.accounts.length + ' cuentas)',
        detail: 'El mismo fingerprint de hardware fue detectado en ' + fp.accounts.length + ' cuentas. Indica acceso desde el mismo dispositivo físico.',
        severity: fp.accounts.length >= 4 ? 'CRÍTICO' : 'ALTO',
        risk: Math.min(999, fp.accounts.length * 180),
        accounts: fp.accounts,
        evidence: [
          'Fingerprint: ' + fp.fp.slice(0,20) + '…',
          'Cuentas con este fingerprint: ' + fp.accounts.length,
          'Cuentas: ' + fp.accounts.slice(0,3).join(', '),
        ],
        fp: fp.fp,
      });
    });
    // Ordenar por severidad
    const sOrder = {'CRÍTICO':0,'ALTO':1,'MEDIO':2};
    alerts.sort((a,b) => (sOrder[a.severity]||2) - (sOrder[b.severity]||2));

    return{suspiciousDevices,suspiciousIPs,sharedFPs,multiDeviceAccounts,alerts,
      totalRows:allRows.length,totalDevices:Object.keys(deviceToAccounts).length,totalAccounts:Object.keys(accountToDevices).length};
  };

  const processUpload=async()=>{
    if(!file){showToast('Falta archivo','err');return;}
    if(fileType==='device'){
      setUploading(true);
      setTimeout(()=>{
        const r=analyzeDevices();
        setResult({type:'device',...r});
        setUploading(false);
        if(onDeviceResult)onDeviceResult(r);
        showToast(`✅ ${r.suspiciousDevices.length} dispositivos sospechosos detectados — ve a Red de Riesgo`,'ok');
      },400);
      return;
    }
    // Transaccional — enviar al backend
    if(!entity){showToast('Falta entidad','err');return;}
    setUploading(true);setResult(null);
    try{
      const token=getToken();
      const fd=new FormData();fd.append('file',file);fd.append('mapping',JSON.stringify(mapping));
      const r=await fetch(API_BASE+'/api/v2/auth/upload',{method:'POST',headers:{'Authorization':'Bearer '+token},body:fd});
      const d=await r.json();
      if(!r.ok){showToast(d.detail||'Error procesando','err');setUploading(false);return;}
      setResult({type:'transactional',...d});
      if(d.saved>0)showToast('✅ '+d.saved+' transacciones procesadas','ok');
      else showToast('No se procesó ninguna fila válida','err');
    }catch(e){showToast('Error: '+e.message,'err');}
    setUploading(false);
  };

  const riskColor=(l)=>l==='CRÍTICO'?'var(--red)':l==='ALTO'?'var(--amber)':'var(--orange)';
  const decColor=(d)=>{if(d==='BLOQUEADA')return'var(--red)';if(d==='REVISIÓN')return'var(--amber)';if(d==='ALERTA')return'var(--orange)';return'var(--teal)';};
  const isDevice=fileType==='device';
  const currentFields=isDevice?DEV_FIELDS:TX_ALL;
  const currentDesc=isDevice?DEV_DESC:TX_DESC;
  const currentRequired=isDevice?['device_id','identity']:TX_REQUIRED;
  const mappingComplete=currentRequired.every(f=>mapping[f]);

  return(
    <div>
      <div className="page-title">📤 Carga Masiva con IA</div>
      <div className="page-sub">Sube cualquier Excel — la IA detecta el tipo de datos y las columnas automáticamente</div>
      {!entity&&fileType!=='device'&&<div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.3)',borderRadius:8,padding:'12px 16px',marginBottom:16,fontSize:11,color:'var(--amber)'}}>⚠ Para análisis transaccional necesitas entidad asignada. Los archivos de dispositivos se analizan localmente sin necesidad de entidad.</div>}

      {/* PASO 1 */}
      {!file&&(
        <div className="card">
          <div className="card-title">Arrastra tu archivo Excel o haz clic para seleccionarlo</div>
          <div onDrop={e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(f)readFile(f);}} onDragOver={e=>e.preventDefault()} onClick={()=>fileRef.current?.click()}
            style={{marginTop:12,border:'2px dashed var(--border2)',borderRadius:10,padding:'48px 24px',textAlign:'center',cursor:'pointer',background:'var(--bg3)',transition:'all .2s'}}
            onMouseEnter={e=>e.currentTarget.style.borderColor='var(--teal)'} onMouseLeave={e=>e.currentTarget.style.borderColor='var(--border2)'}>
            <div style={{fontSize:48,marginBottom:12}}>📂</div>
            <div style={{fontSize:13,color:'var(--light)',fontWeight:600,marginBottom:6}}>Cualquier archivo Excel (.xlsx)</div>
            <div style={{fontSize:10,color:'var(--slate)'}}>La IA detecta automáticamente si es transaccional o de dispositivos</div>
            <input ref={fileRef} type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f);}}/>
          </div>
          <div style={{marginTop:16,display:'flex',gap:8,flexWrap:'wrap'}}>
            {[['💳 Transaccional','montos, canales, titulares → score de fraude'],['📱 Dispositivos/Sesiones','device_id, IPs, fingerprints → dispositivos comprometidos'],['🌐 Cualquier idioma','columnas en español, inglés u otro'],['🤖 Auto-detección','la IA clasifica el archivo y mapea las columnas']].map(([t,d])=>(
              <div key={t} style={{padding:'8px 12px',background:'var(--bg3)',borderRadius:6,fontSize:9,color:'var(--slate)',border:'1px solid var(--border)',flex:'1 1 180px'}}>
                <div style={{color:'var(--light)',marginBottom:2}}>{t}</div>{d}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* PASO 2: MAPEO */}
      {file&&!mappingConfirmed&&(
        <div>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <div style={{background:'var(--bg2)',border:`1px solid ${isDevice?'var(--purple)':'var(--teal)'}`,borderRadius:8,padding:'10px 16px',flex:1,display:'flex',alignItems:'center',gap:12}}>
              <div style={{fontSize:20}}>{isDevice?'📱':'💳'}</div>
              <div>
                <div style={{fontSize:11,color:'var(--white)',fontWeight:600}}>{file.name}</div>
                {fileType&&<div style={{marginTop:3}}>
                  <span style={{fontSize:8,padding:'2px 8px',borderRadius:3,background:isDevice?'rgba(168,85,247,.2)':'rgba(20,184,166,.15)',color:isDevice?'var(--purple)':'var(--teal)',border:`1px solid ${isDevice?'rgba(168,85,247,.3)':'rgba(20,184,166,.3)'}`}}>
                    {isDevice?'📱 ANÁLISIS DE DISPOSITIVOS':'💳 ANÁLISIS TRANSACCIONAL'}
                  </span>
                </div>}
              </div>
              {aiAnalyzing&&<div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:6,fontSize:10,color:'var(--teal)'}}><Spinner/>IA analizando...</div>}
              {!aiAnalyzing&&fileType&&<div style={{marginLeft:'auto',fontSize:9,color:'var(--teal)'}}>✓ {Object.keys(mapping).length} columnas detectadas</div>}
            </div>
            <button className="btn btn-ghost" onClick={()=>{setFile(null);setRawData(null);setMapping({});setFileType(null);fileRef.current&&(fileRef.current.value='');}} style={{whiteSpace:'nowrap'}}>✕ Cambiar</button>
          </div>

          {aiAnalyzing?<div className="center" style={{height:120}}><Spinner/>La IA está clasificando el archivo y detectando columnas...</div>:(
            <>
              {isDevice&&<div style={{background:'rgba(168,85,247,.08)',border:'1px solid rgba(168,85,247,.2)',borderRadius:8,padding:'10px 14px',marginBottom:12,fontSize:10,color:'var(--purple)'}}>
                📱 <strong>Modo Dispositivos:</strong> Se detectarán dispositivos compartidos entre múltiples cuentas, IPs sospechosas, fingerprints duplicados y cuentas con múltiples dispositivos. El análisis se hace localmente sin enviar al backend.
              </div>}
              <div className="card" style={{marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div><div className="card-title" style={{marginBottom:2}}>Mapeo de columnas detectado por IA</div><div style={{fontSize:9,color:'var(--slate)'}}>Revisa y ajusta si es necesario · Solo se requieren los campos marcados *</div></div>
                  <span style={{fontSize:9,color:mappingComplete?'var(--teal)':'var(--amber)'}}>{mappingComplete?'✓ Listo':'⚠ Faltan campos *'}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  {currentFields.map(field=>{
                    const req=currentRequired.includes(field);
                    return(
                      <div key={field} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px',border:`1px solid ${mapping[field]?'rgba(20,184,166,.2)':req?'rgba(255,59,92,.2)':'var(--border)'}`}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:8,color:req?'var(--amber)':'var(--slate)',letterSpacing:'.08em'}}>{field.toUpperCase()}{req?' *':''}</span>{mapping[field]&&<span style={{fontSize:8,color:'var(--teal)'}}>✓</span>}</div>
                        <div style={{fontSize:8,color:'var(--border2)',marginBottom:5}}>{currentDesc[field]||''}</div>
                        <select value={mapping[field]||''} onChange={e=>setMapping(m=>({...m,[field]:e.target.value||undefined}))} style={{width:'100%',padding:'4px 6px',fontSize:9}}>
                          <option value="">-- sin mapear --</option>
                          {headers.map(h=><option key={h} value={h}>{h}</option>)}
                        </select>
                      </div>
                    );
                  })}
                </div>
              </div>

              {rawData&&<div className="card" style={{marginBottom:12}}>
                <div className="card-title">Vista previa (primeras 5 filas)</div>
                <div style={{overflowX:'auto',marginTop:8}}>
                  <table className="tbl"><thead><tr>{headers.map(h=><th key={h}>{h}</th>)}</tr></thead>
                  <tbody>{rawData.map((row,i)=><tr key={i}>{headers.map((_,j)=><td key={j} style={{fontSize:9,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{String(row[j]||'—')}</td>)}</tr>)}</tbody></table>
                </div>
              </div>}

              <button className={`btn ${isDevice?'btn-purple':'btn-red'}`} style={{width:'100%',padding:'12px'}} disabled={!mappingComplete} onClick={()=>setMappingConfirmed(true)}>
                {mappingComplete?(isDevice?'🔍 Analizar dispositivos →':'💳 Confirmar y procesar →'):'Completa los campos requeridos (*)'}
              </button>
            </>
          )}
        </div>
      )}

      {/* PASO 3: CONFIRMAR */}
      {file&&mappingConfirmed&&!result&&(
        <div className="card" style={{textAlign:'center',padding:'40px'}}>
          <div style={{fontSize:40,marginBottom:16}}>{isDevice?'🔍':'⚡'}</div>
          <div style={{fontFamily:'var(--sans)',fontSize:16,fontWeight:700,color:'var(--white)',marginBottom:8}}>{isDevice?'Listo para analizar dispositivos':'Listo para scorear'}</div>
          <div style={{fontSize:10,color:'var(--slate)',marginBottom:24}}>{file.name} · {allRows.length} filas</div>
          <div style={{display:'flex',gap:10,justifyContent:'center'}}>
            <button className={`btn ${isDevice?'btn-purple':'btn-red'}`} style={{padding:'12px 32px',fontSize:12}} disabled={uploading} onClick={processUpload}>
              {uploading?<><Spinner/>{isDevice?'Analizando...':'Procesando...'}</>:(isDevice?'🔍 Detectar dispositivos comprometidos →':'⚡ Procesar y scorear →')}
            </button>
            <button className="btn btn-ghost" onClick={()=>setMappingConfirmed(false)}>← Ajustar mapeo</button>
          </div>
        </div>
      )}

      {/* RESULTADOS DISPOSITIVOS */}
      {result&&result.type==='device'&&(()=>{
        const{suspiciousDevices,suspiciousIPs,sharedFPs,multiDeviceAccounts,alerts,totalRows,totalDevices,totalAccounts}=result;
        const sevColor=(s)=>s==='CRÍTICO'?'var(--red)':s==='ALTO'?'var(--amber)':'var(--orange)';
        const sevBg=(s)=>s==='CRÍTICO'?'rgba(255,59,92,.12)':s==='ALTO'?'rgba(245,158,11,.1)':'rgba(249,115,22,.08)';
        return(
          <div>
            {/* ── PANEL DE ALERTAS ── */}
            {alerts?.length>0&&(
              <div style={{background:'rgba(255,59,92,.06)',border:'1px solid rgba(255,59,92,.25)',borderRadius:10,padding:'14px 18px',marginBottom:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div>
                    <div style={{fontFamily:'var(--sans)',fontSize:16,fontWeight:700,color:'var(--white)'}}>🚨 {alerts.length} Alertas generadas</div>
                    <div style={{fontSize:9,color:'var(--slate)',marginTop:2}}>Análisis de comportamiento de dispositivos — fraude detectado sin necesidad de transacciones financieras</div>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {['CRÍTICO','ALTO','MEDIO'].map(s=>{
                      const n=alerts.filter(a=>a.severity===s).length;
                      return n>0?<span key={s} style={{padding:'3px 10px',borderRadius:4,fontSize:9,fontWeight:700,background:sevBg(s),color:sevColor(s),border:`1px solid ${sevColor(s)}50`}}>{n} {s}</span>:null;
                    })}
                  </div>
                </div>
                {alerts.map((al,i)=>(
                  <div key={i} style={{background:'var(--bg2)',borderRadius:8,padding:'10px 14px',marginBottom:6,borderLeft:`3px solid ${sevColor(al.severity)}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                      <div>
                        <div style={{fontSize:11,color:'var(--white)',fontWeight:600,marginBottom:2}}>{al.title}</div>
                        <div style={{fontSize:9,color:'var(--slate)'}}>{al.detail}</div>
                      </div>
                      <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0,marginLeft:12}}>
                        <span style={{fontFamily:'var(--sans)',fontSize:18,fontWeight:800,color:sevColor(al.severity)}}>{al.risk}</span>
                        <span style={{padding:'2px 8px',borderRadius:3,fontSize:8,fontWeight:700,background:sevBg(al.severity),color:sevColor(al.severity),border:`1px solid ${sevColor(al.severity)}60`}}>{al.severity}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:4,flexWrap:'wrap',marginTop:6}}>
                      {al.evidence?.map((ev,j)=>(
                        <span key={j} style={{fontSize:8,padding:'2px 7px',background:'var(--bg3)',borderRadius:3,color:'var(--muted)',border:'1px solid var(--border)'}}>{ev}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}

            <div className="grid-4" style={{marginBottom:14}}>
              {[['Sesiones analizadas',totalRows,'var(--muted)'],['Dispositivos únicos',totalDevices,'var(--light)'],['Cuentas únicas',totalAccounts,'var(--light)'],['Dispositivos comprometidos',suspiciousDevices.length,'var(--red)']].map(([l,v,c])=>(
                <div className="card" key={l}><div className="card-title">{l}</div><div style={{fontFamily:'var(--sans)',fontSize:24,fontWeight:800,color:c}}>{v}</div></div>
              ))}
            </div>
            <div className="grid-3" style={{marginBottom:14}}>
              <div className="card"><div className="card-title">IPs sospechosas</div><div style={{fontFamily:'var(--sans)',fontSize:28,fontWeight:800,color:'var(--amber)'}}>{suspiciousIPs.length}</div><div style={{fontSize:9,color:'var(--slate)',marginTop:2}}>IPs compartidas entre múltiples cuentas</div></div>
              <div className="card"><div className="card-title">Fingerprints duplicados</div><div style={{fontFamily:'var(--sans)',fontSize:28,fontWeight:800,color:'var(--orange)'}}>{sharedFPs.length}</div><div style={{fontSize:9,color:'var(--slate)',marginTop:2}}>Mismo device en distintas cuentas</div></div>
              <div className="card"><div className="card-title">Cuentas multi-device</div><div style={{fontFamily:'var(--sans)',fontSize:28,fontWeight:800,color:'var(--purple)'}}>{multiDeviceAccounts.length}</div><div style={{fontSize:9,color:'var(--slate)',marginTop:2}}>Cuentas accedidas desde varios devices</div></div>
            </div>

            {suspiciousDevices.length>0&&<>
              <div className="sec" style={{color:'var(--red)'}}>🚨 Dispositivos comprometidos ({suspiciousDevices.length})</div>
              <div style={{marginBottom:14}}>
                {suspiciousDevices.map((d,i)=>(
                  <div key={i} style={{background:'var(--bg2)',border:`1px solid ${riskColor(d.level)}40`,borderLeft:`3px solid ${riskColor(d.level)}`,borderRadius:8,padding:'12px 14px',marginBottom:8}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                      <div>
                        <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--white)',marginBottom:2}}>📱 {d.device}</div>
                        <div style={{fontSize:9,color:'var(--slate)'}}>{d.os||''} {d.browser?'· '+d.browser:''} {d.bank?'· '+d.bank:''}</div>
                      </div>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:800,color:riskColor(d.level)}}>{d.risk}</div>
                        <span style={{fontSize:8,padding:'2px 7px',borderRadius:3,border:`1px solid ${riskColor(d.level)}50`,color:riskColor(d.level),background:riskColor(d.level)+'15'}}>{d.level}</span>
                      </div>
                    </div>
                    <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                      <div style={{flex:1,minWidth:160}}>
                        <div style={{fontSize:8,color:'var(--slate)',marginBottom:4}}>CUENTAS AFECTADAS ({d.accounts.length})</div>
                        {d.accounts.map((a,j)=><div key={j} style={{fontSize:9,padding:'2px 6px',background:'rgba(255,59,92,.1)',borderRadius:3,marginBottom:2,color:'var(--light)',fontFamily:'var(--mono)'}}>{a.slice(0,32)}{a.length>32?'…':''}</div>)}
                      </div>
                      <div style={{flex:1,minWidth:160}}>
                        <div style={{fontSize:8,color:'var(--slate)',marginBottom:4}}>IPs VISTAS ({d.ips.length})</div>
                        {d.ips.slice(0,4).map((ip,j)=><div key={j} style={{fontSize:9,padding:'2px 6px',background:'rgba(245,158,11,.1)',borderRadius:3,marginBottom:2,color:'var(--amber)'}}>{ip}</div>)}
                        {d.ips.length>4&&<div style={{fontSize:8,color:'var(--slate)'}}>+{d.ips.length-4} más</div>}
                      </div>
                    </div>
                    <div style={{marginTop:6,fontSize:8,color:'var(--slate)'}}>Sesiones: {d.sessions} · Fingerprints: {d.fingerprints.length}</div>
                  </div>
                ))}
              </div>
            </>}

            {suspiciousIPs.length>0&&<>
              <div className="sec" style={{color:'var(--amber)'}}>🌐 IPs compartidas entre múltiples cuentas (top 20)</div>
              <div className="card" style={{marginBottom:14}}>
                <table className="tbl"><thead><tr><th>IP</th><th>Cuentas</th><th>Riesgo</th></tr></thead>
                <tbody>{suspiciousIPs.slice(0,20).map((ip,i)=>(
                  <tr key={i}><td style={{fontFamily:'var(--mono)',color:'var(--amber)'}}>{ip.ip}</td>
                  <td><div style={{display:'flex',gap:4,flexWrap:'wrap'}}>{ip.accounts.slice(0,3).map((a,j)=><span key={j} style={{fontSize:8,padding:'1px 5px',background:'rgba(245,158,11,.1)',borderRadius:3}}>{a.slice(0,16)}{a.length>16?'…':''}</span>)}{ip.accounts.length>3&&<span style={{fontSize:8,color:'var(--slate)'}}>+{ip.accounts.length-3}</span>}</div></td>
                  <td><span style={{fontFamily:'var(--sans)',fontWeight:700,color:ip.count>=4?'var(--red)':ip.count>=2?'var(--amber)':'var(--orange)'}}>{ip.count} cuentas</span></td></tr>
                ))}</tbody></table>
              </div>
            </>}

            {multiDeviceAccounts.length>0&&<>
              <div className="sec" style={{color:'var(--purple)'}}>📲 Cuentas accedidas desde múltiples dispositivos</div>
              <div className="card" style={{marginBottom:14}}>
                <table className="tbl"><thead><tr><th>Cuenta</th><th>Dispositivos</th></tr></thead>
                <tbody>{multiDeviceAccounts.slice(0,15).map((a,i)=>(
                  <tr key={i}><td style={{fontFamily:'var(--mono)',color:'var(--light)'}}>{a.account.slice(0,32)}</td>
                  <td><span style={{fontFamily:'var(--sans)',fontWeight:700,color:'var(--purple)'}}>{a.count}</span> <span style={{fontSize:8,color:'var(--slate)'}}>dispositivos</span></td></tr>
                ))}</tbody></table>
              </div>
            </>}

            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-ghost" onClick={()=>{setFile(null);setResult(null);setMapping({});setMappingConfirmed(false);setFileType(null);setAllRows([]);fileRef.current&&(fileRef.current.value='');}}>+ Analizar otro archivo</button>
            </div>
          </div>
        );
      })()}

      {/* RESULTADOS TRANSACCIONALES */}
      {result&&result.type==='transactional'&&(
        <div>
          <div className="grid-3" style={{marginBottom:12}}>
            {[['Total filas',result.total,'var(--muted)'],['Procesadas',result.saved,'var(--teal)'],['Con error',result.errors,result.errors>0?'var(--red)':'var(--slate)']].map(([l,v,c])=>(
              <div className="card" key={l}><div className="card-title">{l}</div><div style={{fontFamily:'var(--sans)',fontSize:28,fontWeight:800,color:c}}>{v}</div></div>
            ))}
          </div>
          {result.scored?.length>0&&(()=>{
            const counts=result.scored.reduce((a,t)=>({...a,[t.decision]:(a[t.decision]||0)+1}),{});
            return(<div className="card" style={{marginBottom:12}}><div className="card-title">Distribución de decisiones</div><div style={{display:'flex',gap:8,marginTop:8,flexWrap:'wrap'}}>{Object.entries(counts).map(([d,n])=><div key={d} style={{background:'var(--bg3)',borderRadius:6,padding:'8px 14px',textAlign:'center'}}><div style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:800,color:decColor(d)}}>{n}</div><div style={{fontSize:8,color:'var(--slate)',marginTop:2}}>{d}</div></div>)}</div></div>);
          })()}
          {result.error_detail?.length>0&&<div className="card" style={{marginBottom:12,border:'1px solid rgba(255,59,92,.2)'}}><div className="card-title" style={{color:'var(--red)'}}>Filas con error ({result.error_detail.length})</div>{result.error_detail.map((e,i)=><div key={i} style={{padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:9}}><span style={{color:'var(--slate)'}}>Fila {e.row} · </span><span style={{color:'var(--red)',marginLeft:8}}>{e.errors?.join(', ')}</span></div>)}</div>}
          {result.scored?.length>0&&<div className="card"><div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}><div className="card-title" style={{margin:0}}>Resultados</div><button className="btn btn-ghost" style={{padding:'4px 10px',fontSize:8}} onClick={()=>{setFile(null);setResult(null);setMapping({});setMappingConfirmed(false);setFileType(null);setAllRows([]);fileRef.current&&(fileRef.current.value='');}}>+ Otro archivo</button></div>
            <div style={{maxHeight:360,overflowY:'auto'}}><table className="tbl"><thead><tr><th>TX ID</th><th>Monto</th><th>Canal</th><th>Score</th><th>Decisión</th><th>Riesgo</th></tr></thead><tbody>{result.scored.slice(0,100).map(t=><tr key={t.tx_id}><td className="mono">{t.tx_id}</td><td>{fmtAmt(t.amount)}</td><td><span className={`badge ${t.risk}`}>{t.channel}</span></td><td style={{fontFamily:'var(--sans)',fontWeight:700,color:scoreColor(t.score)}}>{t.score}</td><td><span className={`badge ${t.decision}`}>{t.decision}</span></td><td><span className={`badge ${t.risk}`}>{t.risk}</span></td></tr>)}</tbody></table></div>
            <div style={{marginTop:8,fontSize:9,color:'var(--teal)'}}>✅ Transacciones en Dashboard y Alertas</div>
          </div>}
        </div>
      )}
    </div>
  );
}

/* ══════════ GRAFO DE RED ══════════ */
function forceLayout(ns,es,w,h,iters=120){
  let nodes=[...ns.map(n=>({...n}))];
  for(let iter=0;iter<iters;iter++){
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        const f=Math.min(4000/(dist*dist),8);
        nodes[i].x-=dx/dist*f;nodes[i].y-=dy/dist*f;
        nodes[j].x+=dx/dist*f;nodes[j].y+=dy/dist*f;
      }
    }
    es.forEach(e=>{
      const a=nodes.find(n=>n.id===e.from),b=nodes.find(n=>n.id===e.to);
      if(!a||!b)return;
      const dx=b.x-a.x,dy=b.y-a.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
      const f=dist*0.015*(e.weight||1);
      a.x+=dx/dist*f;a.y+=dy/dist*f;
      b.x-=dx/dist*f;b.y-=dy/dist*f;
    });
    nodes=nodes.map(n=>({...n,x:Math.max(40,Math.min(w-40,n.x)),y:Math.max(40,Math.min(h-40,n.y))}));
  }
  return nodes;
}

function NetworkGraph({entity,channel,showToast,deviceResult}){
  const [nodes,setNodes]=useState([]);
  const [edges,setEdges]=useState([]);
  const [loading,setLoad]=useState(true);
  const [selected,setSelected]=useState(null);
  const [mode,setMode]=useState(deviceResult?'device':'api'); // 'api' | 'device'
  const [viewMode,setViewMode]=useState('devices'); // 'devices'|'accounts'|'ips'
  const svgRef=useRef();
  const [dims,setDims]=useState({w:800,h:500});

  useEffect(()=>{
    const update=()=>{if(svgRef.current){const r=svgRef.current.getBoundingClientRect();setDims({w:r.width||800,h:r.height||500});}};
    const t=setTimeout(update,100);
    window.addEventListener('resize',update);
    return()=>{clearTimeout(t);window.removeEventListener('resize',update);};
  },[]);

  // Cuando llega deviceResult del upload, cambiar a modo device automáticamente
  useEffect(()=>{if(deviceResult){setMode('device');setSelected(null);};},[deviceResult]);

  // Construir grafo desde deviceResult
  const buildDeviceGraph=useCallback((dr,vm,w,h)=>{
    if(!dr||!w)return;
    setLoad(true);
    const{suspiciousDevices,suspiciousIPs,multiDeviceAccounts}=dr;

    if(vm==='devices'){
      // Nodos = dispositivos sospechosos, aristas = cuentas compartidas
      const ns=suspiciousDevices.slice(0,60).map((d,i)=>({
        id:'dev_'+i,
        label:d.device.slice(0,10)+'…',
        fullLabel:d.device,
        risk:d.level==='CRÍTICO'?'FRAUD':d.level==='ALTO'?'RISKY':'MEDIUM',
        score:d.risk,
        accounts:d.accounts,
        ips:d.ips,
        sessions:d.sessions,
        type:'device',
        x:w*0.1+Math.random()*(w*0.8),
        y:h*0.1+Math.random()*(h*0.8),
      }));
      const es=[];
      for(let i=0;i<ns.length;i++){
        for(let j=i+1;j<ns.length;j++){
          const shared=ns[i].accounts.filter(a=>ns[j].accounts.includes(a));
          if(shared.length>0)es.push({from:ns[i].id,to:ns[j].id,weight:shared.length,label:shared.length+' ctas'});
        }
      }
      const laid=forceLayout(ns,es,w,h);
      setNodes(laid);setEdges(es);
    } else if(vm==='accounts'){
      // Nodos = cuentas, aristas = dispositivos compartidos
      const allAccs=[...new Set(suspiciousDevices.flatMap(d=>d.accounts))].slice(0,80);
      const ns=allAccs.map((acc,i)=>{
        const devs=suspiciousDevices.filter(d=>d.accounts.includes(acc));
        const maxRisk=Math.max(...devs.map(d=>d.risk),0);
        return{id:'acc_'+i,label:acc.slice(0,10)+'…',fullLabel:acc,risk:maxRisk>=700?'FRAUD':maxRisk>=500?'RISKY':'MEDIUM',score:maxRisk,devices:devs.length,type:'account',x:w*0.1+Math.random()*(w*0.8),y:h*0.1+Math.random()*(h*0.8)};
      });
      const es=[];
      for(let i=0;i<ns.length;i++){
        for(let j=i+1;j<ns.length;j++){
          const devA=suspiciousDevices.filter(d=>d.accounts.includes(allAccs[i]));
          const devB=suspiciousDevices.filter(d=>d.accounts.includes(allAccs[j]));
          const sharedDevs=devA.filter(d=>devB.find(d2=>d2.device===d.device));
          if(sharedDevs.length>0)es.push({from:ns[i].id,to:ns[j].id,weight:sharedDevs.length});
        }
      }
      const laid=forceLayout(ns,es,w,h);
      setNodes(laid);setEdges(es);
    } else if(vm==='ips'){
      // Nodos = IPs sospechosas
      const topIPs=suspiciousIPs.slice(0,60);
      const ns=topIPs.map((ip,i)=>({
        id:'ip_'+i,label:ip.ip,fullLabel:ip.ip,
        risk:ip.count>=5?'FRAUD':ip.count>=3?'RISKY':'MEDIUM',
        score:Math.min(999,ip.count*120),
        accounts:ip.accounts,count:ip.count,type:'ip',
        x:w*0.1+Math.random()*(w*0.8),y:h*0.1+Math.random()*(h*0.8),
      }));
      const es=[];
      for(let i=0;i<ns.length;i++){
        for(let j=i+1;j<ns.length;j++){
          const shared=ns[i].accounts.filter(a=>ns[j].accounts.includes(a));
          if(shared.length>0)es.push({from:ns[i].id,to:ns[j].id,weight:shared.length});
        }
      }
      const laid=forceLayout(ns,es,w,h,80);
      setNodes(laid);setEdges(es);
    }
    setLoad(false);
  },[]);

  // Cargar desde API (modo normal)
  const loadFromApi=useCallback(async(w,h)=>{
    setLoad(true);
    try{
      const chParam=channel&&channel!=='ALL'?`&channel=${channel}`:'';
      const d=await api(`/api/v2/profiles?limit=80${entity?`&entity_code=${entity}`:''}${chParam}`);
      const ps=d.profiles||[];
      const ns=ps.map(p=>({
        id:p.id,label:p.identity_value.slice(0,8)+'…',fullLabel:p.identity_value,
        risk:p.risk.risk_label,score:p.risk.score_max_ever,
        tx:p.velocity.tx_30d,fraud:p.risk.fraud_confirmed,type:'profile',
        x:w*0.1+Math.random()*(w*0.8),y:h*0.1+Math.random()*(h*0.8),
      }));
      const es=[];
      for(let i=0;i<ns.length;i++){
        for(let j=i+1;j<ns.length;j++){
          if(ns[i].fraud>0&&ns[j].fraud>0&&Math.random()<0.3)es.push({from:ns[i].id,to:ns[j].id,weight:1});
          else if(ns[i].score>600&&ns[j].score>600&&Math.random()<0.15)es.push({from:ns[i].id,to:ns[j].id,weight:0.5});
        }
      }
      const laid=forceLayout(ns,es,w,h);
      setNodes(laid);setEdges(es);
    }catch(e){showToast('Error cargando red','err');}
    setLoad(false);
  },[entity,channel]);

  useEffect(()=>{
    if(!dims.w||dims.w<100)return;
    setSelected(null);
    if(mode==='device'&&deviceResult){
      buildDeviceGraph(deviceResult,viewMode,dims.w,dims.h);
    } else {
      loadFromApi(dims.w,dims.h);
    }
  },[mode,viewMode,dims.w,deviceResult]);

  const riskNodeColor=(r,s)=>{
    if(r==='FRAUD'||s>=700)return'#ff3b5c';
    if(r==='RISKY'||r==='MEDIUM'||s>=400)return'#f59e0b';
    if(r==='UNKNOWN')return'#6b7280';
    return'#14b8a6';
  };
  const nodeRadius=(n)=>{
    if(n.type==='ip')return Math.min(6+n.count*2,18);
    if(n.type==='device')return n.score>=700?16:n.score>=500?12:8;
    if(n.type==='account')return n.devices>2?14:10;
    return n.fraud>0?14:n.score>600?10:7;
  };
  const selNode=selected?nodes.find(n=>n.id===selected):null;
  const connectedEdges=selNode?edges.filter(e=>e.from===selNode.id||e.to===selNode.id):[];

  return(
    <div>
      <div className="page-title">🕸 Red de Riesgo</div>
      <div className="page-sub">Visualización interactiva de conexiones entre identidades, dispositivos e IPs sospechosas</div>

      {/* Controles */}
      <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
        {deviceResult&&<>
          <button onClick={()=>setMode('device')} className={`btn ${mode==='device'?'btn-purple':'btn-ghost'}`} style={{padding:'4px 12px',fontSize:9}}>📱 Dispositivos del archivo</button>
          <button onClick={()=>setMode('api')} className={`btn ${mode==='api'?'btn-teal':'btn-ghost'}`} style={{padding:'4px 12px',fontSize:9}}>🔗 Perfiles del sistema</button>
          {mode==='device'&&<div style={{display:'flex',gap:4,marginLeft:8}}>
            {[['devices','📱 Devices'],['accounts','👤 Cuentas'],['ips','🌐 IPs']].map(([v,l])=>(
              <button key={v} onClick={()=>setViewMode(v)} style={{padding:'3px 9px',borderRadius:4,border:'1px solid',fontSize:8,cursor:'pointer',fontFamily:'var(--mono)',background:viewMode===v?'rgba(168,85,247,.2)':'var(--bg3)',borderColor:viewMode===v?'rgba(168,85,247,.5)':'var(--border2)',color:viewMode===v?'var(--purple)':'var(--muted)'}}>{l}</button>
            ))}
          </div>}
        </>}
        {!deviceResult&&<div style={{fontSize:9,color:'var(--slate)',padding:'4px 8px',background:'var(--bg3)',borderRadius:4,border:'1px solid var(--border2)'}}>💡 Sube un archivo de dispositivos en Carga Masiva para ver la red de conexiones</div>}
        <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
          {[['🔴 Crítico/Fraud','#ff3b5c'],['🟡 Alto/Risky','#f59e0b'],['🟢 Limpio','#14b8a6'],['⚪ Desconocido','#6b7280']].map(([l,c])=>(
            <div key={l} style={{display:'flex',alignItems:'center',gap:4,fontSize:8,color:'var(--slate)'}}><div style={{width:8,height:8,borderRadius:'50%',background:c}}/>{l}</div>
          ))}
          <span style={{fontSize:8,color:'var(--border2)'}}>|</span>
          <span style={{fontSize:8,color:'var(--slate)'}}>{nodes.length} nodos · {edges.length} aristas</span>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:selNode?'1fr 300px':'1fr',gap:12,height:'calc(100vh - 220px)'}}>
        <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,overflow:'hidden',position:'relative'}}>
          {loading&&<div className="center" style={{flexDirection:'column',gap:8}}><Spinner/>
            <div style={{fontSize:10,color:'var(--slate)'}}>Calculando layout de fuerza...</div>
          </div>}
          {!loading&&<svg ref={svgRef} style={{position:'absolute',top:0,left:0,width:'100%',height:'100%'}}>
            <defs>
              <marker id="arr" markerWidth="5" markerHeight="5" refX="5" refY="2.5" orient="auto">
                <path d="M0,0 L0,5 L5,2.5 z" fill="rgba(255,255,255,.15)"/>
              </marker>
            </defs>
            {edges.map((e,i)=>{
              const a=nodes.find(n=>n.id===e.from),b=nodes.find(n=>n.id===e.to);
              if(!a||!b)return null;
              const isSel=selNode&&(e.from===selNode.id||e.to===selNode.id);
              return<line key={i} x1={a.x} y1={a.y} x2={b.x} y2={b.y}
                stroke={isSel?'rgba(255,59,92,.6)':'rgba(255,255,255,.08)'}
                strokeWidth={isSel?2:(e.weight||1)>1?1.5:1}
                markerEnd="url(#arr)"/>;
            })}
            {nodes.map(n=>{
              const c=riskNodeColor(n.risk,n.score);
              const r=nodeRadius(n);
              const sel=selected===n.id;
              const isConn=selNode&&connectedEdges.some(e=>e.from===n.id||e.to===n.id);
              return<g key={n.id} onClick={()=>setSelected(sel?null:n.id)} style={{cursor:'pointer'}}>
                {sel&&<circle cx={n.x} cy={n.y} r={r+6} fill="none" stroke={c} strokeWidth={1.5} strokeDasharray="4,3" opacity={0.6}/>}
                <circle cx={n.x} cy={n.y} r={r+(sel?3:0)} fill={c}
                  fillOpacity={selNode&&!sel&&!isConn?0.25:sel?1:0.8}
                  stroke={sel?'#fff':isConn?c:'none'} strokeWidth={sel?2:1}/>
                {(sel||n.score>=700||r>=12)&&<text x={n.x} y={n.y-r-5} textAnchor="middle"
                  style={{fontSize:8,fill:'#94a3b8',pointerEvents:'none'}}>{n.label}</text>}
              </g>;
            })}
          </svg>}
          {!loading&&nodes.length===0&&<div className="center" style={{flexDirection:'column',gap:8}}>
            <div style={{fontSize:32,opacity:.2}}>🕸</div>
            <div style={{fontSize:11,color:'var(--slate)'}}>No hay datos para mostrar en este modo</div>
          </div>}
        </div>

        {/* Panel detalle nodo */}
        {selNode&&(
          <div style={{background:'var(--bg2)',border:'1px solid var(--border)',borderRadius:12,padding:'16px',overflowY:'auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
              <div style={{fontFamily:'var(--sans)',fontSize:13,fontWeight:700,color:'var(--white)'}}>{selNode.type==='device'?'📱 Dispositivo':selNode.type==='ip'?'🌐 IP':selNode.type==='account'?'👤 Cuenta':'🔗 Perfil'}</div>
              <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',color:'var(--slate)',fontSize:16,cursor:'pointer'}}>✕</button>
            </div>

            <div style={{background:'var(--bg3)',borderRadius:6,padding:'8px 10px',marginBottom:10,wordBreak:'break-all',fontSize:9,color:'var(--teal)',fontFamily:'var(--mono)'}}>{selNode.fullLabel||selNode.label}</div>

            <div style={{display:'flex',gap:4,marginBottom:10}}>
              <div style={{flex:1,background:'var(--bg3)',borderRadius:5,padding:'7px 9px',textAlign:'center'}}>
                <div style={{fontFamily:'var(--sans)',fontSize:18,fontWeight:800,color:riskNodeColor(selNode.risk,selNode.score)}}>{selNode.score}</div>
                <div style={{fontSize:8,color:'var(--slate)',marginTop:1}}>Score riesgo</div>
              </div>
              <div style={{flex:1,background:'var(--bg3)',borderRadius:5,padding:'7px 9px',textAlign:'center'}}>
                <div style={{fontFamily:'var(--sans)',fontSize:18,fontWeight:800,color:'var(--light)'}}>{connectedEdges.length}</div>
                <div style={{fontSize:8,color:'var(--slate)',marginTop:1}}>Conexiones</div>
              </div>
            </div>

            {selNode.type==='device'&&<>
              {selNode.accounts?.length>0&&<><div style={{fontSize:8,color:'var(--slate)',letterSpacing:'.1em',marginBottom:5}}>CUENTAS AFECTADAS</div>
              {selNode.accounts.map((a,i)=><div key={i} style={{fontSize:9,padding:'4px 7px',background:'rgba(255,59,92,.1)',borderRadius:4,marginBottom:3,color:'var(--light)',fontFamily:'var(--mono)'}}>{a.slice(0,30)}{a.length>30?'…':''}</div>)}</>}
              {selNode.ips?.length>0&&<><div style={{fontSize:8,color:'var(--slate)',letterSpacing:'.1em',margin:'8px 0 5px'}}>IPS USADAS</div>
              {selNode.ips.slice(0,6).map((ip,i)=><div key={i} style={{fontSize:9,padding:'3px 7px',background:'rgba(245,158,11,.1)',borderRadius:4,marginBottom:3,color:'var(--amber)'}}>{ip}</div>)}</>}
              <div style={{marginTop:8,fontSize:9,color:'var(--slate)'}}>Sesiones: {selNode.sessions}</div>
            </>}

            {selNode.type==='ip'&&<>
              <div style={{fontSize:8,color:'var(--slate)',letterSpacing:'.1em',marginBottom:5}}>CUENTAS QUE USARON ESTA IP</div>
              {selNode.accounts?.map((a,i)=><div key={i} style={{fontSize:9,padding:'4px 7px',background:'rgba(59,130,246,.1)',borderRadius:4,marginBottom:3,color:'var(--blue)',fontFamily:'var(--mono)'}}>{a.slice(0,30)}</div>)}
            </>}

            {selNode.type==='account'&&<>
              <div style={{fontSize:9,color:'var(--slate)'}}>Accedida desde <strong style={{color:'var(--purple)'}}>{selNode.devices}</strong> dispositivos sospechosos</div>
            </>}

            {selNode.type==='profile'&&<>
              <div className="grid-2" style={{gap:6}}>
                {[['TX 30d',selNode.tx||0,'var(--light)'],['Fraudes',selNode.fraud||0,(selNode.fraud||0)>0?'var(--red)':'var(--teal)']].map(([l,v,c])=>(
                  <div key={l} style={{background:'var(--bg3)',borderRadius:5,padding:'7px 9px'}}><div style={{fontFamily:'var(--sans)',fontSize:16,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:8,color:'var(--slate)',marginTop:1}}>{l}</div></div>
                ))}
              </div>
            </>}

            {/* Nodos conectados */}
            {connectedEdges.length>0&&<>
              <div style={{fontSize:8,color:'var(--slate)',letterSpacing:'.1em',margin:'10px 0 5px'}}>CONECTADO CON</div>
              {connectedEdges.slice(0,8).map((e,i)=>{
                const otherId=e.from===selNode.id?e.to:e.from;
                const other=nodes.find(n=>n.id===otherId);
                if(!other)return null;
                return<div key={i} onClick={()=>setSelected(otherId)} style={{fontSize:9,padding:'4px 8px',background:'var(--bg3)',borderRadius:4,marginBottom:3,cursor:'pointer',color:'var(--muted)',display:'flex',justifyContent:'space-between',alignItems:'center'}} onMouseEnter={e=>e.currentTarget.style.background='var(--bg4)'} onMouseLeave={e=>e.currentTarget.style.background='var(--bg3)'}>
                  <span style={{fontFamily:'var(--mono)'}}>{other.label}</span>
                  {e.weight>1&&<span style={{fontSize:8,color:'var(--amber)'}}>{e.weight} compartidos</span>}
                </div>;
              })}
            </>}
          </div>
        )}
      </div>
    </div>
  );
}
