/* ══════════ ENTITIES ══════════ */
function Entities({onEntityChange,showToast}){
  const [entities,setEntities]=useState([]);const [loading,setLoad]=useState(true);const [creating,setCreate]=useState(false);const [form,setForm]=useState({code:'',name:'',identity_type:'account_number',score_alert:400,score_review:600,score_block:800,weight_rules:0.4,weight_ml:0.6});const [editing,setEditing]=useState(null);const [saving,setSaving]=useState(false);
  const load=async()=>{try{const d=await api('/api/v2/entities');setEntities(d.entities);setLoad(false);}catch(e){setLoad(false);}};
  useEffect(()=>{load();},[]);
  const create=async()=>{setSaving(true);try{await api('/api/v2/entities',{method:'POST',body:form});showToast('✅ Entidad creada','ok');setCreate(false);setForm({code:'',name:'',identity_type:'account_number',score_alert:400,score_review:600,score_block:800,weight_rules:0.4,weight_ml:0.6});load();onEntityChange();}catch(e){showToast(e.message,'err');}setSaving(false);};
  const saveEdit=async(code)=>{setSaving(true);try{await api(`/api/v2/entities/${code}`,{method:'PATCH',body:editing});showToast('✅ Actualizada','ok');setEditing(null);load();}catch(e){showToast(e.message,'err');}setSaving(false);};
  return(
    <div>
      <div className="page-title">🏛 Entidades</div>
      <div className="page-sub">Configuración de umbrales y pesos por banco/fintech</div>
      <button className="btn btn-red" style={{marginBottom:14}} onClick={()=>setCreate(c=>!c)}>{creating?'✕ Cancelar':'+ Nueva entidad'}</button>
      {creating&&<div className="card" style={{marginBottom:14,border:'1px solid rgba(255,59,92,.2)'}}>
        <div className="sec" style={{marginTop:0}}>Nueva entidad</div>
        <div className="form-row"><div className="form-field"><label className="form-label">Código</label><input className="form-input" placeholder="BANCO_XYZ" value={form.code} onChange={e=>setForm(f=>({...f,code:e.target.value.toUpperCase()}))}/></div><div className="form-field"><label className="form-label">Nombre</label><input className="form-input" placeholder="Banco..." value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}/></div></div>
        <div style={{fontSize:9,color:'var(--slate)',marginBottom:8}}>Umbrales</div>
        <div className="form-row" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>{[['Alerta','score_alert','var(--orange)'],['Revisión','score_review','var(--amber)'],['Bloqueo','score_block','var(--red)']].map(([l,k,c])=><div className="form-field" key={k}><label className="form-label" style={{color:c}}>{l} ≥</label><input className="form-input" type="number" min={0} max={999} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:parseInt(e.target.value)||0}))}/></div>)}</div>
        <button className="btn btn-red" disabled={!form.code||!form.name||saving} onClick={create}>{saving?<><Spinner/>Creando...</>:'Crear →'}</button>
      </div>}
      {loading?<Loading/>:entities.map(e=>(
        <div className="card" key={e.id} style={{marginBottom:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><div><div style={{fontFamily:'var(--sans)',fontSize:15,fontWeight:700}}>{e.name}</div><div style={{fontSize:9,color:'var(--slate)',marginTop:1}}>Código: <span style={{color:'var(--teal)'}}>{e.code}</span> · {e.identity_type}</div></div><button className="btn btn-ghost" style={{padding:'4px 10px',fontSize:9}} onClick={()=>setEditing(editing?.code===e.code?null:{...e,...e.thresholds,...e.weights,code:e.code})}>{editing?.code===e.code?'✕ Cancelar':'Editar'}</button></div>
          {editing?.code===e.code?<><div className="form-row" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>{[['Alerta ≥','score_alert','var(--orange)'],['Revisión ≥','score_review','var(--amber)'],['Bloqueo ≥','score_block','var(--red)']].map(([l,k,c])=><div className="form-field" key={k}><label className="form-label" style={{color:c}}>{l}</label><input className="form-input" type="number" min={0} max={999} value={editing[k]||e.thresholds[k.replace('score_','')]} onChange={ev=>setEditing(ed=>({...ed,[k]:parseInt(ev.target.value)||0}))}/></div>)}</div><button className="btn btn-teal" disabled={saving} onClick={()=>saveEdit(e.code)}>{saving?<><Spinner/>Guardando...</>:'Guardar →'}</button></>:<div style={{display:'flex',gap:8,flexWrap:'wrap'}}>{[['ALERTA','≥'+e.thresholds.alert,'var(--orange)'],['REVISIÓN','≥'+e.thresholds.review,'var(--amber)'],['BLOQUEO','≥'+e.thresholds.block,'var(--red)'],['Reglas',e.weights.rules,'var(--muted)'],['ML',e.weights.ml,'var(--muted)']].map(([l,v,c])=><div key={l} style={{background:'var(--bg3)',borderRadius:4,padding:'5px 10px'}}><div style={{fontSize:7,color:'var(--slate)',letterSpacing:'.1em'}}>{l}</div><div style={{fontFamily:'var(--sans)',fontWeight:700,color:c}}>{v}</div></div>)}</div>}
        </div>
      ))}
    </div>
  );
}

/* ══════════ MODEL PAGE ══════════ */
function ModelPage({entity,showToast}){
  const [stats,setStats]=useState(null);const [versions,setVers]=useState([]);const [loading,setLoad]=useState(true);const [training,setTrain]=useState(false);
  const load=useCallback(async()=>{try{const[s,v]=await Promise.all([api('/api/v2/model/stats'),api('/api/v2/model/versions')]);setStats(s);setVers(v.versions);setLoad(false);}catch(e){setLoad(false);}},[]);
  useEffect(()=>{load();},[load]);
  const train=async(ec)=>{setTrain(true);try{await api(`/api/v2/model/train${ec?`?entity_code=${ec}`:''}`,{method:'POST'});showToast('🤖 Entrenamiento iniciado','ok');setTimeout(load,3000);}catch(e){showToast(e.message,'err');}setTrain(false);};
  if(loading)return<Loading/>;
  return(
    <div>
      <div className="page-title">🤖 Modelo ML Comunitario</div>
      <div className="page-sub">GradientBoosting · Aprende de TODAS las entidades activas · Re-entrenamiento automático</div>
      <div style={{background:'rgba(168,85,247,.08)',border:'1px solid rgba(168,85,247,.2)',borderRadius:8,padding:'10px 14px',marginBottom:16,fontSize:10,color:'var(--purple)'}}>
        ⭐ <strong>El plus del producto:</strong> cada calificación de cualquier analista de cualquier entidad mejora el modelo para todos. Cuantas más entidades usen la plataforma, más preciso se vuelve.
      </div>
      {stats&&<><div className="grid-4" style={{marginBottom:16}}>{[['Labels totales',stats.labels.total,'var(--teal)'],['Fraudes confirmados',stats.labels.fraud,'var(--red)'],['Falsos positivos',stats.labels.false_positives,'var(--teal)'],['Precisión estimada',stats.precision_estimate+'%',stats.precision_estimate>80?'var(--teal)':stats.precision_estimate>60?'var(--amber)':'var(--red)']].map(([l,v,c])=><div className="card" key={l}><div className="card-title">{l}</div><div className="card-val" style={{color:c}}>{v}</div></div>)}</div>
      {stats.latest_model&&<div className="card" style={{marginBottom:14,border:'1px solid rgba(20,184,166,.25)'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:10}}><div><div style={{fontFamily:'var(--sans)',fontSize:14,fontWeight:700}}>🤖 Modelo activo</div><div style={{fontSize:9,color:'var(--teal)',marginTop:1}}>{stats.latest_model.version}</div></div><span className="badge CLEAN">ACTIVO</span></div><div className="grid-4">{[['Samples',stats.latest_model.training.samples],['Accuracy',stats.latest_model.metrics.accuracy?(stats.latest_model.metrics.accuracy*100).toFixed(1)+'%':'—'],['Precision',stats.latest_model.metrics.precision?(stats.latest_model.metrics.precision*100).toFixed(1)+'%':'—'],['Recall',stats.latest_model.metrics.recall?(stats.latest_model.metrics.recall*100).toFixed(1)+'%':'—']].map(([l,v])=><div className="pstat" key={l}><div className="pstat-val">{v}</div><div className="pstat-lbl">{l}</div></div>)}</div></div>}
      <div className="card" style={{marginBottom:14}}><div className="card-title">Re-entrenar</div><div style={{display:'flex',gap:8,marginTop:8}}><button className="btn btn-teal" disabled={training||!stats.ready_for_training} onClick={()=>train(null)}>{training?<><Spinner/>Entrenando...</>:'🌍 Re-entrenar modelo global'}</button>{entity&&<button className="btn btn-amber" disabled={training} onClick={()=>train(entity)}>{training?<><Spinner/>...</>:`🏛 ${entity}`}</button>}</div>{!stats.ready_for_training&&<div style={{marginTop:8,fontSize:9,color:'var(--amber)'}}>⚠ Se necesitan mínimo 5 alertas calificadas. Tienes {stats.labels.total}.</div>}</div></>}
      <div className="sec">Historial de versiones</div>
      <table className="tbl"><thead><tr><th>Versión</th><th>Tipo</th><th>Samples</th><th>Accuracy</th><th>Estado</th><th>Fecha</th></tr></thead><tbody>{versions.map(v=><tr key={v.id}><td style={{fontSize:9,color:'var(--teal)'}}>{v.version}</td><td><span className={`badge ${v.model_type==='global'?'CLEAN':'PENDING'}`}>{v.model_type}</span></td><td>{v.training.samples}</td><td>{v.metrics.accuracy?(v.metrics.accuracy*100).toFixed(1)+'%':'—'}</td><td><span className={`badge ${v.is_active?'CLEAN':'UNKNOWN'}`}>{v.is_active?'ACTIVO':'HISTÓRICO'}</span></td><td className="mono">{fmtDate(v.trained_at)}</td></tr>)}</tbody></table>
    </div>
  );
}

/* ══════════ LOGIN SCREEN ══════════ */
function LoginScreen({onLogin,apiUrl,setApiUrl,testApi,apiOk}){
  const [mode,setMode]=useState('login');const [email,setEmail]=useState('');const [name,setName]=useState('');const [password,setPassword]=useState('');const [entityCode,setEntityCode]=useState('');const [entityName,setEntityName]=useState('');const [loading,setLoading]=useState(false);const [error,setError]=useState('');const [success,setSuccess]=useState('');
  const handleLogin=async()=>{setLoading(true);setError('');setSuccess('');try{const r=await fetch(API_BASE+'/api/v2/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});const d=await r.json();if(!r.ok){setError(d.detail||'Error');return;}localStorage.setItem('auth_token',d.access_token);localStorage.setItem('auth_user',JSON.stringify(d.user));AUTH_TOKEN=d.access_token;onLogin(d.user,d.access_token);}catch(e){setError('No se pudo conectar al backend');}finally{setLoading(false);}};
  const handleRegister=async()=>{setLoading(true);setError('');setSuccess('');if(!entityCode.trim()||!entityName.trim()){setError('Debes indicar el código y nombre de tu institución');setLoading(false);return;}try{const r=await fetch(API_BASE+'/api/v2/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,name,password,requested_entity_code:entityCode.toUpperCase().trim().replace(/\s+/g,'_'),requested_entity_name:entityName.trim()})});const d=await r.json();if(!r.ok){setError(d.detail||'Error');return;}setSuccess('✅ Solicitud enviada. El administrador aprobará tu acceso en breve.');setMode('login');}catch(e){setError('No se pudo conectar');}finally{setLoading(false);}};
  return(
    <div style={{display:'flex',height:'100vh',background:'var(--bg)',alignItems:'center',justifyContent:'center',flexDirection:'column'}}>
      <div style={{position:'fixed',top:0,left:0,right:0,background:'var(--bg2)',borderBottom:'1px solid var(--border)',padding:'0 20px',height:52,display:'flex',alignItems:'center',gap:12}}>
        <div className="logo">Fraud<em>&</em>AML <span style={{color:'var(--slate)',fontWeight:400,fontSize:12}}>Platform</span></div>
        <input className="api-input" value={apiUrl} onChange={e=>setApiUrl(e.target.value)} onBlur={()=>testApi(apiUrl)} onKeyDown={e=>e.key==='Enter'&&testApi(apiUrl)} placeholder="URL del backend" style={{maxWidth:320,flex:'unset'}}/>
        <span className={`api-badge ${apiOk==='ok'?'api-ok':apiOk==='err'?'api-err':'api-testing'}`}>{apiOk==='ok'?'● CONECTADO':apiOk==='err'?'✕ ERROR':'… PROBANDO'}</span>
      </div>
      <div style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:16,padding:'36px',width:420,marginTop:52,maxHeight:'calc(100vh - 80px)',overflowY:'auto'}}>
        <div style={{textAlign:'center',marginBottom:24}}><div style={{fontFamily:'var(--sans)',fontSize:22,fontWeight:800,color:'var(--white)'}}>Fraud<span style={{color:'var(--red)'}}>AML</span></div><div style={{color:'var(--slate)',fontSize:11,marginTop:4}}>{mode==='login'?'Iniciar sesión':'Solicitar acceso'}</div></div>
        {mode==='register'&&<><div style={{marginBottom:12}}><div style={{fontSize:9,color:'var(--slate)',marginBottom:5,letterSpacing:'.08em'}}>NOMBRE COMPLETO</div><input value={name} onChange={e=>setName(e.target.value)} placeholder="Tu nombre" style={{width:'100%',padding:'9px 12px',fontSize:12}}/></div>
        <div style={{marginBottom:12,padding:'8px 12px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--border2)'}}><div style={{fontSize:9,color:'var(--teal)',letterSpacing:'.1em',marginBottom:8,fontWeight:600}}>🏛 TU INSTITUCIÓN FINANCIERA</div><div style={{marginBottom:8}}><div style={{fontSize:9,color:'var(--slate)',marginBottom:4}}>NOMBRE</div><input value={entityName} onChange={e=>setEntityName(e.target.value)} placeholder="ej: Banco de Guayaquil" style={{width:'100%',padding:'7px 10px',fontSize:11}}/></div><div><div style={{fontSize:9,color:'var(--slate)',marginBottom:4}}>CÓDIGO (sin espacios)</div><input value={entityCode} onChange={e=>setEntityCode(e.target.value.toUpperCase().replace(/[^A-Z0-9_]/g,''))} placeholder="ej: BANCO_GYE" style={{width:'100%',padding:'7px 10px',fontSize:11,fontFamily:'var(--mono)'}}/></div></div></>}
        <div style={{marginBottom:12}}><div style={{fontSize:9,color:'var(--slate)',marginBottom:5,letterSpacing:'.08em'}}>EMAIL</div><input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='login'?handleLogin():handleRegister())} placeholder="tu@email.com" style={{width:'100%',padding:'9px 12px',fontSize:12}}/></div>
        <div style={{marginBottom:20}}><div style={{fontSize:9,color:'var(--slate)',marginBottom:5,letterSpacing:'.08em'}}>CONTRASEÑA</div><input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&(mode==='login'?handleLogin():handleRegister())} placeholder="••••••••" style={{width:'100%',padding:'9px 12px',fontSize:12}}/></div>
        {error&&<div style={{background:'rgba(255,59,92,.1)',border:'1px solid rgba(255,59,92,.3)',color:'var(--red)',padding:'8px 12px',borderRadius:6,fontSize:11,marginBottom:14}}>{error}</div>}
        {success&&<div style={{background:'rgba(20,184,166,.1)',border:'1px solid rgba(20,184,166,.3)',color:'var(--teal)',padding:'8px 12px',borderRadius:6,fontSize:11,marginBottom:14}}>{success}</div>}
        <button onClick={mode==='login'?handleLogin:handleRegister} disabled={loading} style={{width:'100%',padding:'11px',background:'var(--teal)',color:'#000',border:'none',borderRadius:8,fontSize:12,fontWeight:600,fontFamily:'var(--mono)',opacity:loading?0.7:1,cursor:loading?'default':'pointer'}}>{loading?'...':(mode==='login'?'Iniciar sesión →':'Enviar solicitud →')}</button>
        <div style={{textAlign:'center',marginTop:16,fontSize:10,color:'var(--slate)'}}>{mode==='login'?<>¿No tienes cuenta? <span style={{color:'var(--teal)',cursor:'pointer'}} onClick={()=>{setMode('register');setError('');setSuccess('');}}>Solicitar acceso</span></>:<>¿Ya tienes? <span style={{color:'var(--teal)',cursor:'pointer'}} onClick={()=>{setMode('login');setError('');setSuccess('');}}>Iniciar sesión</span></>}</div>
      </div>
    </div>
  );
}

/* ══════════ ADMIN PANEL ══════════ */
function AdminPanel({showToast,onBack}){
  const [users,setUsers]=useState([]);const [filter,setFilter]=useState('PENDING');const [loading,setLoading]=useState(true);
  const load=async()=>{setLoading(true);try{const ud=await api(`/api/v2/auth/admin/users?status=${filter}`);setUsers(ud.users||[]);}catch(e){showToast('Error','err');}finally{setLoading(false);}};
  useEffect(()=>{load();},[filter]);
  const approve=async(userId)=>{try{const r=await fetch(API_BASE+`/api/v2/auth/admin/users/${userId}/approve`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AUTH_TOKEN},body:JSON.stringify({})});const d=await r.json();if(!r.ok){showToast(d.detail||'Error','err');return;}showToast('✅ Usuario aprobado — entidad creada','ok');load();}catch(e){showToast('Error','err');}};
  const reject=async(userId)=>{if(!confirm('¿Rechazar?'))return;try{await fetch(API_BASE+`/api/v2/auth/admin/users/${userId}/reject`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AUTH_TOKEN}});showToast('Rechazado','ok');load();}catch(e){showToast('Error','err');}};
  const statusColor={PENDING:'var(--amber)',APPROVED:'var(--teal)',REJECTED:'var(--red)'};
  return(
    <div style={{padding:28,maxWidth:900,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:24}}><button onClick={onBack} style={{background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--light)',padding:'6px 14px',borderRadius:6,fontSize:11}}>← Volver</button><h2 style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:700}}>Panel de Usuarios</h2></div>
      <div style={{display:'flex',gap:8,marginBottom:20}}>{['PENDING','APPROVED','ALL'].map(s=><button key={s} onClick={()=>setFilter(s)} style={{padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',background:filter===s?'var(--teal)':'var(--bg3)',color:filter===s?'#000':'var(--muted)',border:filter===s?'none':'1px solid var(--border2)'}}>{s==='PENDING'?'Pendientes':s==='APPROVED'?'Aprobados':'Todos'}</button>)}<button onClick={load} style={{marginLeft:'auto',padding:'5px 14px',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',background:'var(--bg3)',color:'var(--muted)',border:'1px solid var(--border2)'}}>↻ Recargar</button></div>
      {loading?<div style={{color:'var(--slate)',fontSize:12}}>Cargando...</div>:users.length===0?<div style={{color:'var(--slate)',fontSize:12,textAlign:'center',padding:40}}>No hay usuarios {filter==='PENDING'?'pendientes':''}</div>:(
        <div style={{display:'flex',flexDirection:'column',gap:10}}>{users.map(u=>(
          <div key={u.id} style={{background:'var(--bg2)',border:'1px solid var(--border2)',borderRadius:10,padding:'16px 20px'}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:16,flexWrap:'wrap'}}>
              <div style={{flex:1}}><div style={{fontSize:13,color:'var(--white)',fontWeight:600}}>{u.name}</div><div style={{fontSize:10,color:'var(--slate)',marginTop:2}}>{u.email}</div><div style={{fontSize:9,color:'var(--slate)',marginTop:2}}>{u.created_at?.slice(0,16).replace('T',' ')}</div></div>
              <span style={{fontSize:9,padding:'3px 8px',borderRadius:4,background:'rgba(0,0,0,.3)',color:statusColor[u.status]||'var(--slate)',border:`1px solid ${statusColor[u.status]||'var(--slate)'}`}}>{u.status}</span>
            </div>
            {(u.requested_entity_code||u.entity_code)&&<div style={{marginTop:10,padding:'8px 12px',background:'var(--bg3)',borderRadius:6,border:'1px solid var(--border2)',display:'flex',gap:16,alignItems:'center'}}><div style={{fontSize:9,color:'var(--slate)'}}>🏛 ENTIDAD</div><div><div style={{fontSize:11,color:'var(--white)',fontWeight:600}}>{u.requested_entity_name||u.entity_code}</div><div style={{fontSize:9,color:'var(--teal)'}}>{u.requested_entity_code||u.entity_code}</div></div>{u.status==='APPROVED'&&<span style={{marginLeft:'auto',fontSize:8,color:'var(--teal)'}}>✓ Creada</span>}</div>}
            {u.status==='PENDING'&&<div style={{display:'flex',gap:8,marginTop:12}}><button onClick={()=>approve(u.id)} disabled={!u.requested_entity_code} style={{padding:'7px 18px',background:u.requested_entity_code?'var(--teal)':'var(--bg4)',color:u.requested_entity_code?'#000':'var(--slate)',border:'none',borderRadius:5,fontSize:10,fontFamily:'var(--mono)',cursor:u.requested_entity_code?'pointer':'default'}}>✓ Aprobar y crear entidad</button><button onClick={()=>reject(u.id)} style={{padding:'7px 18px',background:'var(--red3)',color:'var(--red)',border:'1px solid rgba(255,59,92,.3)',borderRadius:5,fontSize:10,fontFamily:'var(--mono)'}}>✗ Rechazar</button></div>}
          </div>
        ))}</div>
      )}
    </div>
  );
}

/* ══════════ APP ROOT ══════════ */
function App(){
  const [page,setPage]=useState('dashboard');const [apiUrl,setApiUrl]=useState(API_BASE);const [apiOk,setApiOk]=useState(null);const [entity,setEntity]=useState('DEMO');const [entities,setEntities]=useState([]);const [pending,setPending]=useState(0);const [toast,setToast]=useState(null);const [channel,setChannel]=useState('ALL');
  const [deviceResult,setDeviceResult]=useState(null);
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('auth_user'));}catch{return null;}});
  const [authed,setAuthed]=useState(()=>!!localStorage.getItem('auth_token'));
  const showToast=useCallback((msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);},[]);
  const onLogin=useCallback((u,token)=>{setUser(u);setAuthed(true);AUTH_TOKEN=token;},[]);
  const logout=useCallback(()=>{localStorage.removeItem('auth_token');localStorage.removeItem('auth_user');AUTH_TOKEN=null;setUser(null);setAuthed(false);},[]);
  const testApi=useCallback(async(url)=>{setApiOk('testing');try{API_BASE=url;localStorage.setItem('api_base',url);await api('/health');setApiOk('ok');}catch(e){setApiOk('err');}},[]);
  const loadEntities=useCallback(async()=>{try{const d=await api('/api/v2/entities');setEntities(d.entities);if(d.entities.length&&!d.entities.find(e=>e.code===entity))setEntity(d.entities[0].code);}catch(e){}},[entity]);
  const loadPending=useCallback(async()=>{try{const d=await api(`/api/v2/alerts?status=PENDING&limit=1${entity?`&entity_code=${entity}`:''}`);setPending(d.total);}catch(e){}},[entity]);
  useEffect(()=>{testApi(apiUrl);const t=setInterval(()=>{loadEntities();loadPending();},8000);loadEntities();loadPending();return()=>clearInterval(t);},[]);
  useEffect(()=>{loadPending();},[entity,page]);
  const activeEntity=user&&user.role!=='superadmin'&&user.entity_code?user.entity_code:entity;
  const nav=[{id:'dashboard',icon:'📊',label:'Dashboard'},{id:'alerts',icon:'🔔',label:'Alertas',badge:pending},{id:'profiles',icon:'👤',label:'Perfiles'},{id:'network',icon:'🕸',label:'Red de Riesgo'},{id:'upload',icon:'📤',label:'Carga Masiva'},{id:'rules',icon:'⚙️',label:'Reglas'},{id:'entities',icon:'🏛',label:'Entidades'},{id:'model',icon:'🤖',label:'Modelo ML'}];
  if(!authed)return<LoginScreen onLogin={onLogin} apiUrl={apiUrl} setApiUrl={setApiUrl} testApi={testApi} apiOk={apiOk}/>;
  if(page==='admin')return(
    <div style={{background:'var(--bg)',minHeight:'100vh'}}>
      <div className="topbar"><div className="logo">Fraud<em>&</em>AML</div><div style={{flex:1}}/><span style={{fontSize:10,color:'var(--slate)'}}>Admin: {user?.name}</span><button onClick={logout} style={{padding:'4px 12px',background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--slate)',borderRadius:5,fontSize:10,fontFamily:'var(--mono)'}}>Cerrar sesión</button></div>
      <AdminPanel showToast={showToast} onBack={()=>setPage('dashboard')}/>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
  return(
    <div className="app">
      <div className="topbar">
        <div className="logo">Fraud<em>&</em>AML <span style={{color:'var(--slate)',fontWeight:400,fontSize:12}}>Platform</span></div>
        <div className="topbar-api"><input className="api-input" value={apiUrl} onChange={e=>setApiUrl(e.target.value)} onBlur={()=>testApi(apiUrl)} onKeyDown={e=>e.key==='Enter'&&testApi(apiUrl)} placeholder="URL del backend"/><span className={`api-badge ${apiOk==='ok'?'api-ok':apiOk==='err'?'api-err':'api-testing'}`}>{apiOk==='ok'?'● CONECTADO':apiOk==='err'?'✕ ERROR':'… PROBANDO'}</span></div>
        <div className="topbar-right"><div className="pulse"/><span>LIVE</span><span style={{color:'var(--border2)'}}>|</span><span style={{color:'var(--teal)',fontSize:9}}>{user?.name} · {user?.role}</span>{user?.role==='superadmin'&&<button onClick={()=>setPage('admin')} style={{padding:'3px 10px',background:'var(--purple3)',border:'1px solid rgba(168,85,247,.3)',color:'var(--purple)',borderRadius:4,fontSize:9,fontFamily:'var(--mono)'}}>👥 Usuarios</button>}<button onClick={logout} style={{padding:'3px 10px',background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--slate)',borderRadius:4,fontSize:9,fontFamily:'var(--mono)'}}>Salir</button></div>
      </div>
      <ChannelBar channel={channel} setChannel={setChannel}/>
      <div className="sidebar">
        <div className="sidebar-entity"><div className="entity-label">Entidad activa</div>{user?.role==='superadmin'?<select className="entity-select" value={entity} onChange={e=>setEntity(e.target.value)}>{entities.map(e=><option key={e.id} value={e.code}>{e.name}</option>)}{entities.length===0&&<option value="DEMO">DEMO</option>}</select>:<div style={{padding:'6px 10px',fontSize:11,color:'var(--teal)'}}>{user?.entity_code||'Sin entidad'}</div>}</div>
        {nav.map(n=><div key={n.id} className={`nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}><span className="nav-icon">{n.icon}</span>{n.label}{n.badge>0&&<span className="nav-badge">{n.badge}</span>}</div>)}
        <div style={{marginTop:'auto',padding:'10px 14px',fontSize:8,color:'var(--slate)',borderTop:'1px solid var(--border)'}}><div>Score: 0–999</div><div style={{marginTop:2}}>Reglas: 23 · AML: 5</div><div style={{marginTop:2}}>ML: GradientBoosting</div><div style={{marginTop:2,color:'var(--purple)'}}>Canal activo: {channel}</div></div>
      </div>
      <div className="main">
        {page==='dashboard'&&<Dashboard entity={activeEntity} channel={channel} toast={showToast}/>}
        {page==='alerts'&&<Alerts entity={activeEntity} channel={channel} showToast={showToast}/>}
        {page==='profiles'&&<Profiles entity={activeEntity} channel={channel} showToast={showToast}/>}
        {page==='network'&&<NetworkGraph entity={activeEntity} channel={channel} showToast={showToast} deviceResult={deviceResult}/>}
        {page==='upload'&&<UploadPage entity={activeEntity} showToast={showToast} onDeviceResult={(r)=>{setDeviceResult(r);setTimeout(()=>setPage('network'),1200);}}/>}
        {page==='rules'&&<RulesEditor entity={activeEntity} showToast={showToast}/>}
        {page==='entities'&&<Entities onEntityChange={loadEntities} showToast={showToast}/>}
        {page==='model'&&<ModelPage entity={activeEntity} showToast={showToast}/>}
      </div>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
