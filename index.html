function RulesEditor({channel, entity, showToast}) {
  const storageKey = 'rules_config';
  const [rules, setRules] = React.useState(() => {
    try {
      const saved = localStorage.getItem(storageKey);
      return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_RULES));
    } catch(e) {
      return JSON.parse(JSON.stringify(DEFAULT_RULES));
    }
  });
  const [editingId, setEditingId] = React.useState(null);
  const [editVals, setEditVals] = React.useState({});
  const [saving, setSaving] = React.useState(false);

  // Pesos del scoring (se leen y escriben en la entidad del backend)
  const [weights, setWeights] = React.useState({rules: 0.4, ml: 0.6});
  const [weightsLoaded, setWeightsLoaded] = React.useState(false);
  const [savingWeights, setSavingWeights] = React.useState(false);
  const [editWeights, setEditWeights] = React.useState(false);
  const [wEdit, setWEdit] = React.useState({rules: 0.4, ml: 0.6});

  // Cargar pesos actuales de la entidad
  React.useEffect(() => {
    if (!entity) return;
    api('/api/v2/entities').then(d => {
      const ent = (d.entities||[]).find(e => e.code === entity);
      if (ent && ent.weights) {
        setWeights({rules: ent.weights.rules||0.4, ml: ent.weights.ml||0.6});
        setWEdit({rules: ent.weights.rules||0.4, ml: ent.weights.ml||0.6});
      }
      setWeightsLoaded(true);
    }).catch(() => setWeightsLoaded(true));
  }, [entity]);

  const saveWeights = async () => {
    const r = parseFloat(wEdit.rules)||0;
    const m = parseFloat(wEdit.ml)||0;
    if (Math.abs(r + m - 1.0) > 0.01) {
      showToast('Los pesos deben sumar exactamente 1.0', 'err'); return;
    }
    setSavingWeights(true);
    try {
      await api('/api/v2/entities/'+entity, {method:'PATCH', body:{weight_rules: r, weight_ml: m}});
      setWeights({rules: r, ml: m});
      setEditWeights(false);
      showToast('Pesos guardados en el backend', 'ok');
    } catch(e) { showToast('Error: '+e.message, 'err'); }
    setSavingWeights(false);
  };

  // Canal activo para mostrar reglas
  const activeChannel = channel && channel !== 'ALL' ? channel : null;

  // Reglas a mostrar: globales + las del canal activo
  const displayRules = [
    ...(rules.ALL || []).map(r => ({...r, scope: 'GLOBAL'})),
    ...(activeChannel ? (rules[activeChannel] || []).map(r => ({...r, scope: activeChannel})) : []),
  ];

  const toggleRule = (scope, id) => {
    setRules(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const rule = next[scope].find(r => r.id === id);
      if (rule) rule.enabled = !rule.enabled;
      localStorage.setItem(storageKey, JSON.stringify(next));
      return next;
    });
    showToast('Regla actualizada', 'ok');
  };

  const startEdit = (rule) => {
    setEditingId(rule.id);
    setEditVals({points: rule.points, threshold: rule.threshold});
  };

  const saveEdit = (scope, id) => {
    setSaving(true);
    setRules(prev => {
      const next = JSON.parse(JSON.stringify(prev));
      const rule = next[scope].find(r => r.id === id);
      if (rule) {
        if (editVals.points !== undefined)   rule.points    = parseInt(editVals.points) || rule.points;
        if (editVals.threshold !== undefined) rule.threshold = parseFloat(editVals.threshold) || rule.threshold;
      }
      localStorage.setItem(storageKey, JSON.stringify(next));
      return next;
    });
    setEditingId(null);
    setSaving(false);
    showToast('Regla guardada', 'ok');
  };

  const resetAll = () => {
    if (!confirm('Restaurar todas las reglas a valores por defecto?')) return;
    const fresh = JSON.parse(JSON.stringify(DEFAULT_RULES));
    setRules(fresh);
    localStorage.setItem(storageKey, JSON.stringify(fresh));
    showToast('Reglas restauradas', 'ok');
  };

  const totalEnabled = displayRules.filter(r => r.enabled).length;
  const maxScore = displayRules.filter(r => r.enabled).reduce((s, r) => s + r.points, 0);

  const scopeColor = s => s === 'GLOBAL' ? 'var(--teal)' : 'var(--blue)';
  const scopeBg   = s => s === 'GLOBAL' ? 'rgba(20,184,166,.12)' : 'rgba(59,130,246,.12)';

  return (
    <div>
      <div className="page-title">Editor de Reglas</div>
      <div className="page-sub">
        Reglas heurísticas de scoring — activas para{' '}
        <span style={{color:'var(--teal)'}}>
          {activeChannel ? activeChannel : 'TODOS LOS CANALES'}
        </span>
      </div>

      {/* Panel de Pesos — conectado al backend */}
      <div className="card" style={{marginBottom:14, border:'1px solid rgba(59,130,246,.25)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div>
            <div style={{fontFamily:'var(--sans)',fontSize:13,fontWeight:700,color:'var(--white)',marginBottom:2}}>
              Pesos del scoring
            </div>
            <div style={{fontSize:9,color:'var(--slate)'}}>
              score_final = score_reglas &times; <span style={{color:'var(--teal)',fontWeight:700}}>{weights.rules}</span>
              {' '}+{' '}score_ML &times; <span style={{color:'var(--purple)',fontWeight:700}}>{weights.ml}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            {!weightsLoaded && <span style={{fontSize:9,color:'var(--slate)'}}>Cargando...</span>}
            {!entity && <span style={{fontSize:9,color:'var(--amber)'}}>Selecciona entidad para editar</span>}
            {entity && !editWeights && (
              <button className="btn btn-ghost" style={{padding:'4px 12px',fontSize:9}} onClick={()=>setEditWeights(true)}>
                Editar pesos
              </button>
            )}
          </div>
        </div>

        {/* Barra visual de pesos */}
        <div style={{height:24,borderRadius:6,overflow:'hidden',display:'flex',marginBottom:10}}>
          <div style={{width:(weights.rules*100)+'%',background:'var(--teal)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#000',transition:'width .4s'}}>
            {weights.rules > 0.1 ? 'REGLAS '+Math.round(weights.rules*100)+'%' : ''}
          </div>
          <div style={{flex:1,background:'var(--purple)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:700,color:'#fff'}}>
            {weights.ml > 0.1 ? 'ML '+Math.round(weights.ml*100)+'%' : ''}
          </div>
        </div>

        {editWeights && entity && (
          <div style={{background:'var(--bg3)',borderRadius:8,padding:'12px 14px',border:'1px solid var(--border2)'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
              {[['Peso Reglas heurísticas','rules','var(--teal)'],['Peso Modelo ML','ml','var(--purple)']].map(([l,k,c])=>(
                <div key={k}>
                  <div style={{fontSize:8,color:c,letterSpacing:'.1em',marginBottom:4,textTransform:'uppercase'}}>{l}</div>
                  <input type="number" min={0} max={1} step={0.05}
                    value={wEdit[k]}
                    onChange={e => {
                      const v = parseFloat(e.target.value)||0;
                      const other = k==='rules'?'ml':'rules';
                      setWEdit(w => ({...w, [k]: v, [other]: Math.max(0, Math.round((1-v)*100)/100)}));
                    }}
                    style={{width:'100%',padding:'6px 8px',fontSize:11,border:'1px solid '+c+'60'}}/>
                </div>
              ))}
            </div>
            <div style={{fontSize:9,color:Math.abs(wEdit.rules+wEdit.ml-1)>0.01?'var(--red)':'var(--teal)',marginBottom:8}}>
              Suma: {(wEdit.rules+wEdit.ml).toFixed(2)} {Math.abs(wEdit.rules+wEdit.ml-1)>0.01?'— deben sumar 1.0':'✓'}
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-teal" style={{padding:'5px 16px',fontSize:9}} disabled={savingWeights||Math.abs(wEdit.rules+wEdit.ml-1)>0.01} onClick={saveWeights}>
                {savingWeights?'Guardando...':'Guardar en backend'}
              </button>
              <button className="btn btn-ghost" style={{padding:'5px 12px',fontSize:9}} onClick={()=>{setEditWeights(false);setWEdit(weights);}}>Cancelar</button>
            </div>
          </div>
        )}
      </div>

      {/* Stats */}
      <div className="grid-4" style={{marginBottom:14}}>
        {[
          ['Reglas activas', totalEnabled, 'var(--teal)'],
          ['Reglas totales', displayRules.length, 'var(--muted)'],
          ['Score max posible', maxScore, maxScore > 800 ? 'var(--red)' : 'var(--amber)'],
          ['Canal filtro', activeChannel || 'GLOBAL', 'var(--blue)'],
        ].map(([l,v,c]) => (
          <div className="card" key={l}>
            <div className="card-title">{l}</div>
            <div style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:800,color:c}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontSize:9,color:'var(--slate)'}}>
          {activeChannel
            ? 'Mostrando reglas globales + reglas específicas de ' + activeChannel
            : 'Mostrando reglas globales. Selecciona un canal en el filtro superior para ver reglas específicas.'}
        </div>
        <button className="btn btn-ghost" style={{padding:'4px 12px',fontSize:9}} onClick={resetAll}>
          ↺ Restaurar defaults
        </button>
      </div>

      {/* Separador GLOBAL */}
      <div className="sec">Reglas globales (todos los canales)</div>
      {(rules.ALL||[]).map(rule => (
        <RuleRow key={rule.id} rule={{...rule, scope:'ALL'}} editingId={editingId} editVals={editVals}
          setEditVals={setEditVals} onToggle={()=>toggleRule('ALL',rule.id)}
          onEdit={()=>startEdit(rule)} onSave={()=>saveEdit('ALL',rule.id)}
          onCancel={()=>setEditingId(null)} saving={saving} scopeColor='var(--teal)' scopeLabel='GLOBAL'/>
      ))}

      {/* Separador por canal */}
      {activeChannel && (<>
        <div className="sec" style={{color:'var(--blue)'}}>Reglas específicas — {activeChannel}</div>
        {(rules[activeChannel]||[]).map(rule => (
          <RuleRow key={rule.id} rule={{...rule, scope:activeChannel}} editingId={editingId} editVals={editVals}
            setEditVals={setEditVals} onToggle={()=>toggleRule(activeChannel,rule.id)}
            onEdit={()=>startEdit(rule)} onSave={()=>saveEdit(activeChannel,rule.id)}
            onCancel={()=>setEditingId(null)} saving={saving} scopeColor='var(--blue)' scopeLabel={activeChannel}/>
        ))}
      </>)}

      {!activeChannel && (
        <div style={{background:'rgba(59,130,246,.06)',border:'1px solid rgba(59,130,246,.2)',borderRadius:8,padding:'14px 16px',marginTop:12,fontSize:10,color:'var(--blue)'}}>
          💡 Selecciona un canal en el filtro superior (CARD, TRANSFER, WALLET, ATM, DIGITAL_BANKING) para ver y editar las reglas específicas de ese canal.
        </div>
      )}
    </div>
  );
}

function RuleRow({rule, editingId, editVals, setEditVals, onToggle, onEdit, onSave, onCancel, saving, scopeColor, scopeLabel}) {
  const isEditing = editingId === rule.id;
  return (
    <div className="rule-row" style={{background: rule.enabled ? 'transparent' : 'rgba(0,0,0,.2)', opacity: rule.enabled ? 1 : 0.5}}>
      {/* Toggle */}
      <button className={'rule-toggle ' + (rule.enabled ? 'rule-toggle-on' : 'rule-toggle-off')}
        onClick={onToggle} title={rule.enabled ? 'Desactivar' : 'Activar'}/>

      {/* ID + scope */}
      <div style={{display:'flex',flexDirection:'column',gap:2,minWidth:52}}>
        <span style={{fontSize:8,fontFamily:'var(--mono)',color:'var(--slate)'}}>{rule.id}</span>
        <span style={{fontSize:7,padding:'1px 4px',borderRadius:2,background:scopeColor+'20',color:scopeColor,fontWeight:600}}>{scopeLabel}</span>
      </div>

      {/* Nombre + descripcion */}
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontSize:10,color: rule.enabled ? 'var(--white)' : 'var(--slate)',fontWeight:500,marginBottom:1}}>{rule.name}</div>
        <div style={{fontSize:8,color:'var(--border2)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{rule.description}</div>
      </div>

      {/* Threshold (si editable y tiene threshold) */}
      {rule.editable && rule.threshold !== undefined && (
        <div style={{minWidth:80,textAlign:'right'}}>
          {isEditing ? (
            <input type="number" value={editVals.threshold ?? rule.threshold}
              onChange={e=>setEditVals(v=>({...v,threshold:e.target.value}))}
              style={{width:70,padding:'3px 6px',fontSize:9,textAlign:'right'}}/>
          ) : (
            <div style={{fontSize:9,color:'var(--slate)'}}>
              {rule.op} <span style={{color:'var(--amber)',fontFamily:'var(--mono)'}}>{rule.threshold?.toLocaleString()}</span>
            </div>
          )}
        </div>
      )}

      {/* Puntos */}
      <div style={{minWidth:60,textAlign:'right'}}>
        {isEditing ? (
          <input type="number" min={0} max={999} value={editVals.points ?? rule.points}
            onChange={e=>setEditVals(v=>({...v,points:e.target.value}))}
            style={{width:55,padding:'3px 6px',fontSize:9,textAlign:'right'}}/>
        ) : (
          <div>
            <span style={{fontFamily:'var(--sans)',fontSize:14,fontWeight:700,
              color: rule.points>=300?'var(--red)':rule.points>=150?'var(--amber)':'var(--teal)'}}>
              +{rule.points}
            </span>
            <div style={{fontSize:7,color:'var(--border2)'}}>puntos</div>
          </div>
        )}
      </div>

      {/* Acciones */}
      {rule.editable && (
        <div style={{display:'flex',gap:4,flexShrink:0}}>
          {isEditing ? (<>
            <button className="btn btn-teal" style={{padding:'3px 8px',fontSize:8}} disabled={saving} onClick={onSave}>Guardar</button>
            <button className="btn btn-ghost" style={{padding:'3px 8px',fontSize:8}} onClick={onCancel}>✕</button>
          </>) : (
            <button className="btn btn-ghost" style={{padding:'3px 8px',fontSize:8}} onClick={onEdit}>Editar</button>
          )}
        </div>
      )}
      {!rule.editable && (
        <div style={{width:54,textAlign:'center'}}>
          <span style={{fontSize:7,color:'var(--border2)'}}>FIJA</span>
        </div>
      )}
    </div>
  );
}


function NetworkGraph({deviceAlerts, channel, entity, showToast}) {
  const svgRef = useRef(null);
  const [tooltip,      setTooltip]      = React.useState(null);
  const [selectedNode, setSelectedNode] = React.useState(null);
  const [filter,       setFilter]       = React.useState('ALL');
  const [zoom,         setZoom]         = React.useState(1);

  // Alertas reales del backend (8 días, canal activo)
  const [backendAlerts, setBackendAlerts] = React.useState([]);
  const [loading,       setLoading]       = React.useState(false);
  const [lastChannel,   setLastChannel]   = React.useState(null);

  const loadBackendAlerts = React.useCallback(async () => {
    setLoading(true);
    try {
      const chQ    = (channel && channel !== 'ALL') ? '&channel=' + channel : '';
      const entQ   = entity ? '&entity_code=' + entity : '';
      const d = await api('/api/v2/alerts?status=ALL&limit=300&days=8' + chQ + entQ);
      setBackendAlerts(d.data || []);
      setLastChannel(channel);
    } catch(e) {
      showToast('Error cargando red: ' + e.message, 'err');
    }
    setLoading(false);
  }, [channel, entity]);

  useEffect(() => { loadBackendAlerts(); }, [loadBackendAlerts]);

  // Mapear alerta backend → nodo de grafo (incluye identity_value del perfil)
  // También incorporar deviceAlerts del análisis offline
  const buildGraph = React.useCallback(() => {
    const nodes  = [];
    const links  = [];
    const nodeMap = {};

    const addNode = (id, type, label, risk, meta) => {
      if (!nodeMap[id]) {
        nodeMap[id] = {id, type, label, risk: risk||0, meta: meta||{}, connections: 0};
        nodes.push(nodeMap[id]);
      }
      return nodeMap[id];
    };

    // ── Fuente 1: alertas del backend (transaccionales) ──────────
    const sevMap = {CRITICAL: 'CRITICO', HIGH: 'ALTO', MEDIUM: 'MEDIO', LOW: 'BAJO'};
    const riskMap = {CRITICAL: 850, HIGH: 550, MEDIUM: 350, LOW: 100};

    const bFiltered = filter === 'ALL'
      ? backendAlerts
      : backendAlerts.filter(a => sevMap[a.risk_level] === filter);

    bFiltered.forEach(a => {
      const alertId = 'balert_' + a.id;
      const risk    = riskMap[a.risk_level] || 200;
      const label   = (a.cardholder || a.top_rule || 'Alerta').slice(0, 28);
      const alertNode = addNode(alertId, 'alert', label, risk, {
        type: a.channel, severity: sevMap[a.risk_level] || a.risk_level,
        detail: a.top_rule || a.decision,
        score: a.score_final, channel: a.channel,
        amount: a.amount, city: a.city,
      });

      // Nodo cuenta (identity_value del perfil si disponible)
      if (a.profile_id) {
        const accId   = 'acc_' + a.profile_id;
        const accNode = addNode(accId, 'account', 'ID:' + a.profile_id, 0, {profile_id: a.profile_id});
        links.push({source: alertId, target: accId, type: a.channel || 'TX'});
        alertNode.connections++;
        accNode.connections++;
        accNode.risk = Math.max(accNode.risk, risk * 0.6);
      }

      // Agrupar por canal (nodo canal como hub)
      if (a.channel) {
        const chId   = 'ch_' + a.channel;
        const chNode = addNode(chId, 'channel', a.channel, 0, {channel: a.channel});
        links.push({source: alertId, target: chId, type: 'CANAL'});
        alertNode.connections++;
        chNode.connections++;
        chNode.risk = Math.max(chNode.risk, risk * 0.3);
      }
    });

    // ── Fuente 2: deviceAlerts offline (análisis sesiones) ───────
    const devFiltered = filter === 'ALL'
      ? deviceAlerts
      : deviceAlerts.filter(a => a.severity === filter);

    devFiltered.forEach(alert => {
      const alertId   = 'dalert_' + alert.id;
      const alertNode = addNode(alertId, 'alert', alert.title.slice(0,30), alert.risk, {
        type: alert.type, severity: alert.severity, detail: alert.detail, source: 'device'
      });
      (alert.accounts||[]).forEach(acc => {
        const accId   = 'acc_d_' + acc;
        const accNode = addNode(accId, 'account', acc.slice(0,20), 0, {account: acc});
        links.push({source: alertId, target: accId, type: alert.type});
        alertNode.connections++;
        accNode.connections++;
        accNode.risk = Math.max(accNode.risk, alert.risk * 0.6);
      });
      (alert.ips||[]).forEach(ip => {
        const ipId   = 'ip_' + ip;
        const ipNode = addNode(ipId, 'ip', ip, 0, {ip});
        links.push({source: alertId, target: ipId, type: 'IP'});
        alertNode.connections++;
        ipNode.connections++;
        ipNode.risk = Math.max(ipNode.risk, alert.risk * 0.4);
      });
    });

    return {nodes, links};
  }, [backendAlerts, deviceAlerts, filter]);

  // Renderizar con D3 force simulation
  useEffect(() => {
    if (!svgRef.current) return;
    const graph = buildGraph();
    if (!graph.nodes.length) return;

    const container = svgRef.current.parentElement;
    const W = container.clientWidth || 900;
    const H = container.clientHeight || 500;

    // Limpiar SVG anterior
    const svgEl = svgRef.current;
    while (svgEl.firstChild) svgEl.removeChild(svgEl.firstChild);

    const svg = d3.select(svgEl)
      .attr('width', W).attr('height', H);

    // Defs para gradientes/markers
    const defs = svg.append('defs');
    defs.append('marker')
      .attr('id','arrow').attr('viewBox','0 -5 10 10')
      .attr('refX',22).attr('refY',0)
      .attr('markerWidth',6).attr('markerHeight',6)
      .attr('orient','auto')
      .append('path').attr('d','M0,-5L10,0L0,5').attr('fill','rgba(255,255,255,.15)');

    // Grupo principal con zoom/pan
    const g = svg.append('g').attr('class','graph-root');
    svg.call(
      d3.zoom().scaleExtent([0.2, 4])
        .on('zoom', ev => {
          g.attr('transform', ev.transform);
          setZoom(Math.round(ev.transform.k * 100));
        })
    );

    // Color por tipo/riesgo
    const nodeColor = (d) => {
      if (d.type === 'alert') {
        if (d.risk >= 700) return '#ff3b5c';
        if (d.risk >= 450) return '#f59e0b';
        return '#f97316';
      }
      if (d.type === 'account') return d.risk > 400 ? '#c42040' : '#3b82f6';
      if (d.type === 'ip') return '#a855f7';
      return '#6b7280';
    };

    const nodeRadius = (d) => {
      if (d.type === 'alert') return Math.max(12, Math.min(28, 10 + d.connections * 3));
      return d.type === 'account' ? 10 : 8;
    };

    const linkColor = (d) => {
      if (d.type === 'DEVICE_SHARING') return 'rgba(255,59,92,.4)';
      if (d.type === 'SHARED_IP' || d.type === 'IP') return 'rgba(168,85,247,.35)';
      if (d.type === 'DUPLICATE_FINGERPRINT') return 'rgba(245,158,11,.35)';
      return 'rgba(255,255,255,.1)';
    };

    // Simulación de fuerzas
    const sim = d3.forceSimulation(graph.nodes)
      .force('link', d3.forceLink(graph.links).id(d => d.id).distance(d => {
        if (d.source.type === 'alert') return 90;
        return 60;
      }).strength(0.7))
      .force('charge', d3.forceManyBody().strength(-220))
      .force('center', d3.forceCenter(W/2, H/2))
      .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 8));

    // Links
    const link = g.append('g').selectAll('line')
      .data(graph.links).join('line')
      .attr('stroke', d => linkColor(d))
      .attr('stroke-width', 1.5)
      .attr('marker-end', 'url(#arrow)');

    // Nodos — grupo
    const node = g.append('g').selectAll('g')
      .data(graph.nodes).join('g')
      .attr('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
        .on('drag',  (ev, d) => { d.fx=ev.x; d.fy=ev.y; })
        .on('end',   (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
      )
      .on('mouseenter', (ev, d) => {
        setTooltip({x: ev.offsetX, y: ev.offsetY, node: d});
        setSelectedNode(d.id);
      })
      .on('mouseleave', () => { setTooltip(null); setSelectedNode(null); });

    // Círculo exterior (glow para alertas)
    node.filter(d => d.type === 'alert')
      .append('circle')
      .attr('r', d => nodeRadius(d) + 6)
      .attr('fill', 'none')
      .attr('stroke', d => nodeColor(d))
      .attr('stroke-width', 1)
      .attr('opacity', 0.3);

    // Círculo principal
    node.append('circle')
      .attr('r', d => nodeRadius(d))
      .attr('fill', d => nodeColor(d))
      .attr('stroke', '#07080c')
      .attr('stroke-width', 2)
      .attr('opacity', d => d.type === 'alert' ? 1 : 0.85);

    // Icono interno
    node.append('text')
      .attr('text-anchor', 'middle')
      .attr('dominant-baseline', 'central')
      .attr('font-size', d => d.type === 'alert' ? 11 : 9)
      .attr('fill', '#fff')
      .attr('pointer-events', 'none')
      .text(d => d.type === 'alert' ? '!' : d.type === 'ip' ? 'IP' : '#');

    // Label debajo
    node.append('text')
      .attr('text-anchor', 'middle')
      .attr('y', d => nodeRadius(d) + 12)
      .attr('font-size', 8)
      .attr('fill', 'rgba(255,255,255,.5)')
      .attr('pointer-events', 'none')
      .text(d => d.label.slice(0, 16) + (d.label.length > 16 ? '...' : ''));

    // Tick
    sim.on('tick', () => {
      link
        .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
      node.attr('transform', d => 'translate('+d.x+','+d.y+')');
    });

    return () => sim.stop();
  }, [buildGraph]);

  const graph = buildGraph();
  const alertNodes   = graph.nodes.filter(n => n.type === 'alert').length;
  const accountNodes = graph.nodes.filter(n => n.type === 'account').length;
  const ipNodes      = graph.nodes.filter(n => n.type === 'ip').length;
  const critNodes    = graph.nodes.filter(n => n.risk >= 700).length;

  const sevColor = s => s==='CRITICO'?'var(--red)':s==='ALTO'?'var(--amber)':'var(--orange)';
  const chLabel  = (!channel || channel === 'ALL') ? 'Todos los canales' : channel;

  return (
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
        <div>
          <div className="page-title">Red de Riesgo</div>
          <div className="page-sub">
            Últimos 8 días · Canal: <span style={{color:'var(--teal)',fontFamily:'var(--mono)'}}>{chLabel}</span>
            {loading && <span style={{marginLeft:8,color:'var(--slate)'}}> Cargando...</span>}
            {!loading && <span style={{marginLeft:8,color:'var(--slate)'}}>· {backendAlerts.length} alertas + {deviceAlerts.length} dispositivos</span>}
          </div>
        </div>
        <button className="btn btn-ghost" style={{fontSize:9,padding:'4px 12px'}} onClick={loadBackendAlerts} disabled={loading}>
          ↻ Refrescar
        </button>
      </div>

      {!loading && graph.nodes.length === 0 && (
        <div className="card" style={{textAlign:'center',padding:'60px',opacity:.5}}>
          <div style={{fontSize:40,marginBottom:12}}>🕸</div>
          <div style={{fontSize:12,color:'var(--slate)'}}>Sin datos de red para este canal</div>
          <div style={{fontSize:10,color:'var(--border2)',marginTop:6}}>
            {(!channel||channel==='ALL')
              ? 'Envía transacciones para generar alertas, o carga sesiones en Carga Masiva'
              : 'Sin alertas en canal ' + channel + ' en los últimos 8 días'}
          </div>
        </div>
      )}

      {(loading || graph.nodes.length > 0) && (<>
        {/* KPIs */}
        <div className="grid-4" style={{marginBottom:14}}>
          {[
            ['Alertas en red', alertNodes,   'var(--red)'],
            ['Cuentas',        accountNodes, 'var(--blue)'],
            ['IPs / Canales',  ipNodes + graph.nodes.filter(n=>n.type==='channel').length, 'var(--purple)'],
            ['Riesgo crítico', critNodes,    'var(--red)'],
          ].map(([l,v,c])=>(
            <div className="card" key={l}>
              <div className="card-title">{l}</div>
              <div style={{fontFamily:'var(--sans)',fontSize:24,fontWeight:800,color:c}}>{loading?'…':v}</div>
            </div>
          ))}
        </div>

        {/* Controles */}
        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
          <span style={{fontSize:9,color:'var(--slate)'}}>Filtrar severidad:</span>
          {['ALL','CRITICO','ALTO','MEDIO'].map(s=>(
            <button key={s} onClick={()=>setFilter(s)}
              style={{padding:'3px 10px',borderRadius:4,border:'1px solid',fontSize:8,fontFamily:'var(--mono)',cursor:'pointer',
                background:filter===s?(s==='CRITICO'?'rgba(255,59,92,.15)':s==='ALTO'?'rgba(245,158,11,.12)':s==='MEDIO'?'rgba(249,115,22,.1)':'rgba(20,184,166,.1)'):'var(--bg3)',
                borderColor:filter===s?(s==='CRITICO'?'rgba(255,59,92,.5)':s==='ALTO'?'rgba(245,158,11,.5)':s==='MEDIO'?'rgba(249,115,22,.5)':'rgba(20,184,166,.4)'):'var(--border2)',
                color:filter===s?(s==='CRITICO'?'var(--red)':s==='ALTO'?'var(--amber)':s==='MEDIO'?'var(--orange)':'var(--teal)'):'var(--muted)'}}>
              {s}
            </button>
          ))}
          <span style={{marginLeft:'auto',fontSize:9,color:'var(--slate)'}}>Zoom: {zoom}% · Arrastra nodos · Scroll para zoom</span>
        </div>

        {/* Leyenda */}
        <div className="net-legend">
          {[['Alerta critica','#ff3b5c'],['Alerta alta','#f59e0b'],['Alerta media','#f97316'],['Cuenta comprometida','#c42040'],['Cuenta','#3b82f6'],['IP','#a855f7']].map(([l,c])=>(
            <div key={l} className="net-legend-item"><div className="net-legend-dot" style={{background:c}}/>{l}</div>
          ))}
          <div className="net-legend-item"><div style={{width:24,height:2,background:'rgba(255,59,92,.4)',borderRadius:1}}/> Dispositivo compartido</div>
          <div className="net-legend-item"><div style={{width:24,height:2,background:'rgba(168,85,247,.35)',borderRadius:1}}/> IP compartida</div>
        </div>

        {/* Canvas SVG */}
        <div className="net-canvas">
          <svg ref={svgRef} style={{width:'100%',height:'100%'}}/>
          {tooltip && (
            <div className="net-tooltip" style={{left: Math.min(tooltip.x+12, (svgRef.current?.parentElement?.clientWidth||900)-230), top: tooltip.y-10}}>
              <div style={{fontWeight:600,marginBottom:4,color:
                tooltip.node.type==='alert'?(tooltip.node.risk>=700?'var(--red)':tooltip.node.risk>=450?'var(--amber)':'var(--orange)'):
                tooltip.node.type==='ip'?'var(--purple)':'var(--blue)'}}>
                {tooltip.node.type==='alert'?'Alerta':tooltip.node.type==='ip'?'IP':'Cuenta'}
              </div>
              <div style={{color:'var(--light)',wordBreak:'break-all',marginBottom:4}}>{tooltip.node.label}</div>
              {tooltip.node.risk > 0 && <div style={{fontSize:8,color:'var(--slate)'}}>Riesgo: <span style={{color:'var(--amber)'}}>{tooltip.node.risk}</span></div>}
              {tooltip.node.meta?.severity && <div style={{fontSize:8,color:sevColor(tooltip.node.meta.severity)}}>Severidad: {tooltip.node.meta.severity}</div>}
              {tooltip.node.meta?.detail && <div style={{fontSize:8,color:'var(--slate)',marginTop:3}}>{tooltip.node.meta.detail.slice(0,80)}</div>}
              <div style={{fontSize:8,color:'var(--border2)',marginTop:3}}>Conexiones: {tooltip.node.connections}</div>
            </div>
          )}
          {graph.nodes.length === 0 && (
            <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:8,opacity:.4}}>
              <div style={{fontSize:32}}>🕸</div>
              <div style={{fontSize:10,color:'var(--slate)'}}>Sin nodos para este filtro</div>
            </div>
          )}
        </div>

        {/* Panel detalle del nodo seleccionado */}
        {selectedNode && (() => {
          const n = graph.nodes.find(x => x.id === selectedNode);
          if (!n) return null;
          const related = graph.links.filter(l => l.source.id === selectedNode || l.target.id === selectedNode);
          return (
            <div className="card" style={{marginTop:12,border:'1px solid var(--border2)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div style={{fontFamily:'var(--sans)',fontSize:13,fontWeight:700,color:'var(--white)'}}>
                  {n.type==='alert'?'Alerta':n.type==='ip'?'IP':' Cuenta'}: {n.label}
                </div>
                <span style={{fontFamily:'var(--sans)',fontSize:20,fontWeight:800,color:n.risk>=700?'var(--red)':n.risk>=450?'var(--amber)':'var(--orange)'}}>{n.risk}</span>
              </div>
              <div style={{fontSize:9,color:'var(--slate)'}}>Conexiones directas: <span style={{color:'var(--light)'}}>{related.length}</span></div>
              {n.meta?.detail && <div style={{fontSize:9,color:'var(--muted)',marginTop:4}}>{n.meta.detail}</div>}
            </div>
          );
        })()}
      </>)}
    </div>
  );
}


function App() {
  const [page,setPage]=useState('dashboard');
  const [apiUrl,setApiUrl]=useState(API_BASE);
  const [apiOk,setApiOk]=useState(null);
  const [entity,setEntity]=useState('DEMO');
  const [entities,setEntities]=useState([]);
  const [pending,setPending]=useState(0);
  const [toast,setToast]=useState(null);
  const [deviceAlerts,setDeviceAlerts]=useState(()=>{
    try{const s=localStorage.getItem('device_alerts');return s?JSON.parse(s):[];}catch(e){return [];}
  });
  const [user,setUser]=useState(()=>{
    try{return JSON.parse(localStorage.getItem('auth_user'));}catch(e){return null;}
  });
  const [authed,setAuthed]=useState(()=>!!localStorage.getItem('auth_token'));
  const [channel,setChannel]=useState(()=>localStorage.getItem('global_channel')||'ALL');

  const changeChannel=useCallback((ch)=>{
    setChannel(ch);
    localStorage.setItem('global_channel',ch);
  },[]);

  const showToast=useCallback((msg,type='ok')=>{
    setToast({msg,type});setTimeout(()=>setToast(null),3500);
  },[]);

  const onLogin=useCallback((u,token)=>{setUser(u);setAuthed(true);AUTH_TOKEN=token;},[]);

  const logout=useCallback(()=>{
    localStorage.removeItem('auth_token');localStorage.removeItem('auth_user');
    AUTH_TOKEN=null;setUser(null);setAuthed(false);
  },[]);

  const testApi=useCallback(async(url)=>{
    setApiOk('testing');
    try{API_BASE=url;localStorage.setItem('api_base',url);await api('/health');setApiOk('ok');}
    catch(e){setApiOk('err');}
  },[]);

  const loadEntities=useCallback(async()=>{
    try{
      const d=await api('/api/v2/entities');
      setEntities(d.entities);
      if(d.entities.length&&!d.entities.find(e=>e.code===entity))setEntity(d.entities[0].code);
    }catch(e){}
  },[entity]);

  const loadPending=useCallback(async()=>{
    try{
      const d=await api('/api/v2/alerts?status=PENDING&limit=1'+(entity?'&entity_code='+entity:''));
      setPending(d.total);
    }catch(e){}
  },[entity]);

  useEffect(()=>{
    testApi(apiUrl);
    const t=setInterval(()=>{loadEntities();loadPending();},8000);
    loadEntities();loadPending();
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{loadPending();},[entity,page]);

  const onDeviceResult=useCallback((r)=>{
    if(!r.alerts||!r.alerts.length)return;
    setDeviceAlerts(prev=>{
      const stamped=r.alerts.map(a=>({...a,created_at:a.created_at||new Date().toISOString()}));
      const merged=[...stamped,...prev];
      try{localStorage.setItem('device_alerts',JSON.stringify(merged.slice(0,500)));}catch(e){}
      return merged.slice(0,500);
    });
    showToast('🚨 '+r.alerts.length+' alertas guardadas en Otras Alertas','ok');
    setTimeout(()=>setPage('other_alerts'),1200);
  },[showToast]);

  const devicePending=deviceAlerts.filter(a=>a.status==='PENDING').length;
  const totalBadge=pending+devicePending;

  const nav=[
    {id:'dashboard',icon:'📊',label:'Dashboard'},
    {id:'alerts',icon:'🔔',label:'Alertas',badge:totalBadge},
    {id:'other_alerts',icon:'🛡',label:'Otras Alertas',badge:devicePending},
    {id:'network',icon:'🕸',label:'Red de Riesgo'},
    {id:'profiles',icon:'👤',label:'Perfiles'},
    {id:'upload',icon:'📤',label:'Carga Masiva'},
    {id:'entities',icon:'🏛',label:'Entidades'},
    {id:'rules',icon:'⚙',label:'Reglas'},
    {id:'model',icon:'🤖',label:'Modelo ML'},
  ];

  const activeEntity=user&&user.role!=='superadmin'&&user.entity_code?user.entity_code:entity;

  if(!authed){
    return <LoginScreen onLogin={onLogin} apiUrl={apiUrl} setApiUrl={setApiUrl} testApi={testApi} apiOk={apiOk}/>;
  }

  if(page==='admin'){
    return(
      <div style={{background:'var(--bg)',minHeight:'100vh'}}>
        <div className="topbar" style={{display:'flex',alignItems:'center',padding:'0 20px',gap:14,background:'var(--bg2)',borderBottom:'1px solid var(--border)',height:52}}>
          <div className="logo">Fraud<em>&</em>AML <span style={{color:'var(--slate)',fontWeight:400,fontSize:12}}>Platform</span></div>
          <div style={{flex:1}}/>
          <span style={{fontSize:10,color:'var(--slate)'}}>Admin: {user&&user.name}</span>
          <button onClick={logout} style={{padding:'4px 12px',background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--slate)',borderRadius:5,fontSize:10,fontFamily:'var(--mono)'}}>Cerrar sesion</button>
        </div>
        <AdminPanel showToast={showToast} onBack={()=>setPage('dashboard')}/>
        {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      </div>
    );
  }

  return(
    <div className="app">
      <div className="topbar">
        <div className="logo">Fraud<em>&</em>AML <span style={{color:'var(--slate)',fontWeight:400,fontSize:12}}>Platform</span></div>
        <div className="topbar-api">
          <input className="api-input" value={apiUrl} onChange={e=>setApiUrl(e.target.value)} onBlur={()=>testApi(apiUrl)} onKeyDown={e=>e.key==='Enter'&&testApi(apiUrl)} placeholder="URL del backend (Railway)"/>
          <span className={'api-badge '+(apiOk==='ok'?'api-ok':apiOk==='err'?'api-err':'api-testing')}>
            {apiOk==='ok'?'CONECTADO':apiOk==='err'?'ERROR':'PROBANDO'}
          </span>
        </div>
        <div className="ch-bar">
          {[['ALL','TODOS','ch-btn-all'],['CARD','CARD','ch-btn-card'],['TRANSFER','TRANSFER','ch-btn-transfer'],['WALLET','WALLET','ch-btn-wallet'],['ATM','ATM','ch-btn-atm'],['DIGITAL_BANKING','DIGITAL','ch-btn-digital']].map(([ch,label,cls])=>(
            <button key={ch} className={'ch-btn '+cls+(channel===ch?' sel':'')} onClick={()=>changeChannel(ch)}>{label}</button>
          ))}
        </div>
        <div className="topbar-right">
          <div className="pulse"/><span>LIVE</span>
          <span style={{color:'var(--border2)'}}>|</span>
          <span style={{color:'var(--teal)',fontSize:9}}>{user&&user.name} - {user&&user.role}</span>
          {user&&user.role==='superadmin'&&(
            <button onClick={()=>setPage('admin')} style={{padding:'3px 10px',background:'var(--purple3)',border:'1px solid rgba(168,85,247,.3)',color:'var(--purple)',borderRadius:4,fontSize:9,fontFamily:'var(--mono)'}}>
              Usuarios
            </button>
          )}
          <button onClick={logout} style={{padding:'3px 10px',background:'var(--bg3)',border:'1px solid var(--border2)',color:'var(--slate)',borderRadius:4,fontSize:9,fontFamily:'var(--mono)'}}>
            Salir
          </button>
        </div>
      </div>

      <div className="sidebar">
        <div className="sidebar-entity">
          <div className="entity-label">Entidad activa</div>
          {user&&user.role==='superadmin'?(
            <select className="entity-select" value={entity} onChange={e=>setEntity(e.target.value)}>
              {entities.map(e=><option key={e.id} value={e.code}>{e.name}</option>)}
              {entities.length===0&&<option value="DEMO">DEMO (cargando...)</option>}
            </select>
          ):(
            <div className="entity-select" style={{padding:'6px 10px',fontSize:11,color:'var(--teal)',cursor:'default'}}>
              {user&&user.entity_code||'Sin entidad'}
            </div>
          )}
        </div>
        {nav.map(n=>(
          <div key={n.id} className={'nav-item '+(page===n.id?'active':'')} onClick={()=>setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>
            {n.label}
            {n.badge>0&&<span className="nav-badge">{n.badge}</span>}
          </div>
        ))}
        <div style={{marginTop:'auto',padding:'10px 14px',fontSize:8,color:'var(--slate)',borderTop:'1px solid var(--border)'}}>
          <div>Score: 0-999</div>
          <div style={{marginTop:2}}>Modelo: GradientBoosting</div>
        </div>
      </div>

      <div className="main">
        {page==='dashboard'&&<Dashboard entity={activeEntity} channel={channel} toast={showToast}/>}
        {page==='alerts'&&<Alerts entity={activeEntity} channel={channel} showToast={showToast} userRole={user&&user.role}/>}
        {page==='other_alerts'&&<OtherAlerts alerts={deviceAlerts} setAlerts={setDeviceAlerts} showToast={showToast}/>}
        {page==='network'&&<NetworkGraph deviceAlerts={deviceAlerts} channel={channel} entity={activeEntity} showToast={showToast}/>}
        {page==='profiles'&&<Profiles entity={activeEntity} channel={channel} showToast={showToast}/>}
        {page==='upload'&&<UploadPage entity={activeEntity} showToast={showToast} onDeviceResult={onDeviceResult}/>}
        {page==='entities'&&<Entities onEntityChange={loadEntities} showToast={showToast}/>}
        {page==='rules'&&<RulesEditor channel={channel} entity={activeEntity} showToast={showToast}/>}
        {page==='model'&&<ModelPage entity={activeEntity} showToast={showToast} userRole={user&&user.role}/>}
      </div>

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
